<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap Maker PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Libre+Baskerville:wght@700&family=IBM+Plex+Mono:wght@400;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e0d; --surf:#181714; --bd:#2e2c28; --tx:#e6e2d6; --mu:#746e62; --gold:#c8a84b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* UI Fixes */
header{background:var(--surf);height:50px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--bd);justify-content:space-between;flex-shrink:0;}
.app{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--surf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;}
.main{flex:1;display:grid;grid-template-columns:1fr 1.3fr;overflow:hidden;}
.panel{display:flex;flex-direction:column;border-right:1px solid var(--bd);overflow:hidden;}
.panel-head{padding:8px 14px;background:var(--surf);border-bottom:1px solid var(--bd);font-size:10px;font-weight:900;color:var(--gold);display:flex;justify-content:space-between;align-items:center;}
.meta-row{display:grid;grid-template-columns:1fr 1fr 64px;gap:8px;padding:10px;border-bottom:1px solid var(--bd);}
input{background:#111;border:1px solid #3e3c38;color:#fff;padding:6px;border-radius:4px;font-size:12px;outline:none;}
textarea{flex:1;background:#0c0c0b;color:#d8d4c8;border:none;padding:15px;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.8;outline:none;resize:none;}
.tab-bar{display:flex;background:var(--surf);border-bottom:1px solid var(--bd);}
.tab{flex:1;padding:12px;background:none;border:none;color:var(--mu);font-size:10px;font-weight:900;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ROADMAP RENDERING - ESTILO CHORDSHEET */
.grid-body{flex:1;overflow-y:auto;padding:40px;background:#19171a; display: flex; flex-direction: column; align-items: center;}
.rb{background:#fff;padding:60px 50px;width:100%;max-width:800px;color:#000;font-family:'Patrick Hand', cursive;min-height:min-content;}
.rb-title{font-size:34px;line-height:1;margin-bottom:2px;}
.rb-sub{font-size:16px;color:#555;margin-bottom:15px;}
.rb-hr{border:none;border-top:2px solid #000;margin-bottom:30px;}

/* CSS para fundir as pautas */
.rb-system-wrap { margin-top: -1.5px; break-inside: avoid; page-break-inside: avoid; }
.rb-sec-group { margin-bottom: 35px; }

@media print {
  body, html { height: auto !important; overflow: visible !important; }
  header, .sidebar, .panel, .tab-bar { display: none !important; }
  .app, .main, .grid-body { display: block !important; overflow: visible !important; background: white !important; padding: 0 !important; }
  .rb { box-shadow: none !important; padding: 20px !important; }
}
</style>
</head>
<body>

<header>
  <div style="font-family:'Libre Baskerville';font-weight:700;color:var(--gold)">ROADMAP MAKER PRO</div>
  <button style="background:var(--gold);border:none;padding:8px 16px;font-weight:900;cursor:pointer;border-radius:4px;" onclick="window.print()">IMPRIMIR / PDF</button>
</header>

<div class="app">
  <div class="sidebar">
    <div style="padding:12px;font-size:10px;color:var(--mu);font-weight:900;border-bottom:1px solid var(--bd)">REPERTÓRIO</div>
    <div id="songList" style="flex:1;overflow-y:auto;padding:5px"></div>
    <button style="background:var(--gold);margin:10px;padding:10px;border:none;font-weight:900;cursor:pointer;border-radius:4px;" onclick="createNewSong()">+ NOVA MÚSICA</button>
  </div>

  <div class="main">
    <div class="panel">
      <div class="panel-head">01: CIFRA BRUTA</div>
      <div class="meta-row">
        <input type="text" id="iTitle" placeholder="Título" oninput="save()">
        <input type="text" id="iArtist" placeholder="Artista" oninput="save()">
        <input type="text" id="iKey" placeholder="Tom" oninput="save()">
      </div>
      <textarea id="cifraBruta" placeholder="Cole a cifra aqui..." oninput="autoClean()"></textarea>
    </div>

    <div class="panel">
      <div class="tab-bar">
        <button class="tab active" id="tab-cs" onclick="switchTab('cs')">02. MAPA DE TEXTO</button>
        <button class="tab" id="tab-grid" onclick="switchTab('grid')">03. ROADMAP VISUAL</button>
      </div>
      <div id="view-cs" style="display:flex;flex:1;flex-direction:column;">
        <div class="panel-head">EDITAR ROTEIRO <button style="background:var(--gold);border:none;padding:3px 8px;font-size:9px;font-weight:900;cursor:pointer" onclick="update()">⚡ ATUALIZAR</button></div>
        <textarea id="csEdit" oninput="save();update();"></textarea>
      </div>
      <div id="view-grid" style="display:none;flex:1;" class="grid-body">
        <div id="out" class="rb"></div>
      </div>
    </div>
  </div>
</div>

<script>
let songs = JSON.parse(localStorage.getItem('roadmap_v8') || '[]');
let currentId = null;
const W = 600, H = 65, barW = W/4;

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('view-cs').style.display=t==='cs'?'flex':'none';
  document.getElementById('view-grid').style.display=t==='grid'?'flex':'none';
  if(t==='grid') update();
}

function autoClean(){
  const raw = document.getElementById('cifraBruta').value;
  const lines = raw.split('\n');
  let map = [];
  lines.forEach(l=>{
    let t = l.trim();
    if(!t) return;
    let sec = t.match(/\[(.*?)\]/);
    if(sec) { map.push(`: ${sec[1]}`); return; }
    const chords = t.match(/\b([A-G][b#]?(maj7|m7b5|ø7|m7|7|Δ7|dim7|m|sus4|add9|9|C9|4|D4)?)\b/g);
    if(chords) map.push(chords.join('  '));
  });
  document.getElementById('csEdit').value = map.join('\n');
  save(); update();
}

function renderSVG(line, label, isFirstInSec, isRep){
  let svg = `<svg viewBox="0 -30 ${W} ${H+30}" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;overflow:visible;">`;
  const midY = H/2;
  
  // Pautas: Apenas linhas horizontais sem bordas laterais para parecer pauta
  svg += `<line x1="0" y1="0" x2="${W}" y2="0" stroke="black" stroke-width="2"/>`;
  svg += `<line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="black" stroke-width="2"/>`;
  
  // Barlines rítmicas (internas finas, externas médias)
  for(let i=0; i<=4; i++){
    let sw = (i===0 || i===4) ? 2.5 : 1;
    svg += `<line x1="${i*barW}" y1="0" x2="${i*barW}" y2="${H}" stroke="black" stroke-width="${sw}"/>`;
  }

  // Ritornello Start
  if(isRep && isFirstInSec){
    svg += `<line x1="7" y1="0" x2="7" y2="${H}" stroke="black" stroke-width="1.2"/>`;
    svg += `<rect x="0" y="0" width="5" height="${H}" fill="black"/>`;
    svg += `<circle cx="15" cy="${midY-8}" r="2.8" fill="black"/><circle cx="15" cy="${midY+8}" r="2.8" fill="black"/>`;
  }

  // Marca de Seção (Igual ChordSheet)
  if(label && isFirstInSec){
    svg += `<rect x="0" y="-24" width="22" height="22" fill="white" stroke="black" stroke-width="1.2"/>`;
    svg += `<text x="11" y="-13" font-family="Patrick Hand" font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="central">${label[0].toUpperCase()}</text>`;
  }

  const chords = line.trim().split(/\s+/).slice(0,4);
  chords.forEach((chord, i)=>{
    const cx = i*barW + barW/2;
    if(chord==='%' || !chord){
      svg += `<line x1="${cx-12}" y1="${midY+12}" x2="${cx+12}" y2="${midY-12}" stroke="#888" stroke-width="2"/>`;
      svg += `<circle cx="${cx-8}" cy="${midY-8}" r="2.5" fill="#888"/><circle cx="${cx+8}" cy="${midY+8}" r="2.5" fill="#888"/>`;
    } else {
      let m = chord.match(/^([A-G][b#]?)(.*)$/);
      if(m){
        svg += `<text x="${cx}" y="${midY}" font-family="Patrick Hand" font-size="36" text-anchor="middle" dominant-baseline="central">${m[1]}<tspan dy="-12" font-size="18">${m[2].replace(/maj7/gi,'Δ7').replace(/m7b5/gi,'ø7')}</tspan></text>`;
      }
    }
  });
  return svg + `</svg>`;
}

function update(){
  const out = document.getElementById('out');
  const title = document.getElementById('iTitle').value || 'Música';
  const artist = document.getElementById('iArtist').value || '';
  const key = document.getElementById('iKey').value || '';
  const text = document.getElementById('csEdit').value;

  let html = `<div class="rb-title">${title}</div>`;
  html += `<div class="rb-sub">${artist} ${key ? '| Tom: '+key : ''}</div><hr class="rb-hr">`;

  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l!=="");
  let currentLabel = null;
  let grid = `<div class="rb-sec-group">`;

  lines.forEach((line, idx)=>{
    if(line.startsWith(':')){
      if(idx > 0) grid += `</div><div class="rb-sec-group">`;
      currentLabel = line.replace(':','').trim();
    } else {
      const isRep = line.includes('(') || line.includes('x');
      const cleanLine = line.replace(/[()]/g,'').replace(/ x\d+/,'');
      grid += `<div class="rb-system-wrap">${renderSVG(cleanLine, currentLabel, !!currentLabel, isRep)}</div>`;
      currentLabel = null;
    }
  });
  out.innerHTML = html + grid + `</div>`;
}

function createNewSong(){
  let s = {id:Date.now(), title:'', artist:'', key:'', raw:'', clean:''};
  songs.push(s); load(s.id);
}
function load(id){
  currentId = id; const s = songs.find(x=>x.id===id);
  if(!s) return;
  document.getElementById('iTitle').value=s.title||'';
  document.getElementById('iArtist').value=s.artist||'';
  document.getElementById('iKey').value=s.key||'';
  document.getElementById('cifraBruta').value=s.raw||'';
  document.getElementById('csEdit').value=s.clean||'';
  renderSongs(); update();
}
function save(){
  if(!currentId) return; const s = songs.find(x=>x.id===currentId);
  s.title=document.getElementById('iTitle').value;
  s.artist=document.getElementById('iArtist').value;
  s.key=document.getElementById('iKey').value;
  s.raw=document.getElementById('cifraBruta').value;
  s.clean=document.getElementById('csEdit').value;
  localStorage.setItem('roadmap_v8', JSON.stringify(songs));
  renderSongs();
}
function renderSongs(){
  document.getElementById('songList').innerHTML = songs.map(s=>`
    <div class="song-item ${s.id===currentId?'active':''}" onclick="load(${s.id})">
      <span>${s.title||'Nova Música'}</span>
      <span style="color:#a04848; cursor:pointer" onclick="deleteSong(${s.id},event)">✕</span>
    </div>`).join('');
}
function deleteSong(id,e){
  e.stopPropagation(); if(!confirm('Excluir?')) return;
  songs = songs.filter(x=>x.id!==id);
  localStorage.setItem('roadmap_v8', JSON.stringify(songs));
  songs.length>0?load(songs[0].id):location.reload();
}
if(songs.length>0) load(songs[0].id); else createNewSong();
</script>
</body>
</html>
