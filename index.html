<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Chart Maker - Pro Version</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root { --bg: #0f0e0d; --gold: #c8a84b; --paper: #f5f0e4; --ink: #161310; }
    body { margin: 0; background: var(--bg); color: #e6e2d6; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
    header { background: #181714; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid #2e2c28; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .editor { width: 40%; display: flex; flex-direction: column; border-right: 1px solid #2e2c28; background: #111; }
    .preview { flex: 1; overflow-y: auto; padding: 40px; background: #201e1a; display: flex; justify-content: center; }
    
    textarea { flex: 1; background: transparent; color: #fff; border: none; padding: 20px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; outline: none; resize: none; }
    .meta { padding: 15px; display: grid; grid-template-columns: 1fr 1fr 60px; gap: 10px; border-bottom: 1px solid #2e2c28; }
    input { background: #181714; border: 1px solid #3e3c38; color: #fff; padding: 8px; border-radius: 4px; font-size: 12px; }

    /* Estilo Real Book */
    .rb { background: var(--paper); color: var(--ink); padding: 50px; width: 100%; max-width: 750px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .rb-title { font-family: 'Libre Baskerville', serif; font-size: 32px; font-weight: 700; margin: 0; }
    .rb-meta { margin-bottom: 25px; border-bottom: 3px solid var(--ink); padding-bottom: 5px; }
    .rb-system { margin-top: -1.5px; position: relative; }
    .rb-sec { margin-bottom: 30px; }
    
    @media print {
        header, .editor { display: none; }
        .preview { background: #fff; padding: 0; }
        .rb { box-shadow: none; max-width: 100%; }
    }
</style>
</head>
<body>

<header>
    <div style="font-family: 'Libre Baskerville'; color: var(--gold); font-size: 18px;">Chord Chart Maker</div>
    <button onclick="window.print()" style="margin-left:auto; background:var(--gold); border:none; padding:8px 15px; font-weight:700; cursor:pointer; border-radius:4px;">IMPRIMIR PDF</button>
</header>

<div class="main">
    <div class="editor">
        <div class="meta">
            <input type="text" id="title" placeholder="Música" oninput="draw()">
            <input type="text" id="artist" placeholder="Artista" oninput="draw()">
            <input type="text" id="key" placeholder="Tom" oninput="draw()">
        </div>
        <textarea id="input" placeholder="Intro: G C D C&#10;Verso: G Em C D" oninput="draw()"></textarea>
    </div>
    <div class="preview">
        <div id="paper" class="rb"></div>
    </div>
</div>

<script>
const W = 600, H = 60;
const barW = W / 4;

function draw() {
    const text = document.getElementById('input').value;
    const paper = document.getElementById('paper');
    const songTitle = document.getElementById('title').value || "Sem Título";
    
    let html = `<div class="rb-meta"><div class="rb-title">${songTitle}</div>`;
    html += `<div>${document.getElementById('artist').value}</div>`;
    html += `<div style="font-size:12px">Tom: ${document.getElementById('key').value}</div></div>`;

    const sections = text.split('\n').reduce((acc, line) => {
        if (line.includes(':')) {
            acc.push({ label: line.split(':')[0], lines: [] });
        } else if (line.trim() && acc.length > 0) {
            acc[acc.length - 1].lines.push(line.trim());
        } else if (line.trim()) {
            acc.push({ label: '', lines: [line.trim()] });
        }
        return acc;
    }, []);

    sections.forEach(sec => {
        html += `<div class="rb-sec">`;
        sec.lines.forEach((line, idx) => {
            const chords = line.split(/\s+/).slice(0, 4);
            while(chords.length < 4) chords.push('%');
            html += `<div class="rb-system">${renderSVG(chords, idx === 0 ? sec.label : null)}</div>`;
        });
        html += `</div>`;
    });
    paper.innerHTML = html;
}

function renderSVG(chords, label) {
    let svg = `<svg viewBox="0 -25 ${W} ${H+25}" style="display:block; width:100%; overflow:visible;">`;
    
    // Pauta
    svg += `<line x1="0" y1="0" x2="${W}" y2="0" stroke="black" stroke-width="2"/>`;
    svg += `<line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="black" stroke-width="2"/>`;
    
    // Barras
    for(let i=0; i<=4; i++) {
        let sw = (i === 0 || i === 4) ? 2.5 : 1;
        svg += `<line x1="${i*barW}" y1="0" x2="${i*barW}" y2="${H}" stroke="black" stroke-width="${sw}"/>`;
    }

    // Seção
    if (label) {
        svg += `<rect x="0" y="-22" width="18" height="18" fill="black"/>`;
        svg += `<text x="9" y="-12" fill="white" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="central">${label[0].toUpperCase()}</text>`;
    }

    chords.forEach((chord, i) => {
        const cx = i * barW + barW / 2;
        if (chord === '%') {
            svg += `<line x1="${cx-10}" y1="${H/2+10}" x2="${cx+10}" y2="${H/2-10}" stroke="#888" stroke-width="2"/>`;
            svg += `<circle cx="${cx-6}" cy="${H/2-6}" r="2" fill="#888"/><circle cx="${cx+6}" cy="${H/2+6}" r="2" fill="#888"/>`;
        } else {
            // Split chord root and quality
            let root = chord[0], qual = chord.slice(1);
            svg += `<text x="${cx}" y="${H/2}" font-family="IBM Plex Mono" font-weight="700" font-size="22" text-anchor="middle" dominant-baseline="central">${root}<tspan dy="-8" font-size="12" font-weight="400">${qual}</tspan></text>`;
        }
    });

    return svg + `</svg>`;
}
</script>
</body>
</html>
