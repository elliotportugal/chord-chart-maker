<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chord Chart Maker - Real Book Style</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=IBM+Plex+Mono:wght@400;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e0d; --surf:#181714; --surf2:#201f1c; --tx:#e6e2d6; --mu:#746e62;
  --gold:#c8a84b; --pp:#f5f0e4; --ink:#161310;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* UI Layout */
header{background:var(--surf);height:50px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #2e2c28;gap:10px;}
.app{display:flex;flex:1;overflow:hidden;}
.main{flex:1;display:grid;grid-template-columns:1fr 1.2fr;overflow:hidden;}
.panel{display:flex;flex-direction:column;border-right:1px solid #2e2c28;overflow:hidden;}

/* Editor */
.meta-row{display:grid;grid-template-columns:1fr 1fr 60px;gap:8px;padding:12px;background:var(--surf);}
.fi{background:#111;border:1px solid #3e3c38;color:#fff;padding:6px;border-radius:4px;font-size:12px;}
textarea{flex:1;background:#111;color:#fff;border:none;padding:15px;font-family:'IBM Plex Mono',monospace;font-size:13px;resize:none;outline:none;}

/* Grid Rendering */
.grid-body{flex:1;overflow-y:auto;padding:40px;background:#1a1917;display:flex;justify-content:center;}
.rb{background:var(--pp);padding:40px;width:100%;max-width:700px;min-height:100%;box-shadow:0 10px 50px rgba(0,0,0,0.5);color:var(--ink);}
.rb-title{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:900;margin-bottom:4px;}
.rb-artist{font-style:italic;margin-bottom:20px;opacity:0.8;}

/* Real Book Architecture */
.rb-system-wrap {
  margin-top: -1.5px; /* Funde as linhas horizontais */
  position: relative;
}
.rb-sec-group { margin-bottom: 35px; }

@media print {
  body * { visibility: hidden; }
  .grid-body, .rb, .rb * { visibility: visible; }
  .grid-body { position: absolute; left: 0; top: 0; width: 100%; padding: 0; background: #fff; }
  .rb { box-shadow: none; max-width: 100%; padding: 20px; }
}
</style>
</head>
<body>

<header>
  <div style="font-family:'Libre Baskerville',serif;color:var(--gold);font-weight:700">Chord Chart Maker</div>
  <button onclick="window.print()" style="margin-left:auto;padding:5px 15px;background:var(--gold);border:none;border-radius:4px;font-weight:900;cursor:pointer">IMPRIMIR PDF</button>
</header>

<div class="app">
  <div class="main">
    <div class="panel">
      <div class="meta-row">
        <input type="text" id="iTitle" class="fi" placeholder="Título" oninput="update()">
        <input type="text" id="iArtist" class="fi" placeholder="Artista" oninput="update()">
        <input type="text" id="iKey" class="fi" placeholder="Tom" oninput="update()">
      </div>
      <textarea id="cifraIn" placeholder="Cole sua cifra aqui..." oninput="update()"></textarea>
    </div>
    <div class="grid-body">
      <div id="out" class="rb"></div>
    </div>
  </div>
</div>

<script>
const W=600, H=65;
const barW = W/4;

function svgLine(x1,y1,x2,y2,sw,col){ return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${sw}" />`; }

function drawMeasureRepeat(cx, cy) {
  return `
    <line x1="${cx-15}" y1="${cy+12}" x2="${cx+15}" y2="${cy-12}" stroke="#9a9070" stroke-width="2" />
    <circle cx="${cx-8}" cy="${cy-7}" r="2.5" fill="#9a9070" />
    <circle cx="${cx+8}" cy="${cy+7}" r="2.5" fill="#9a9070" />
  `;
}

function chordText(chord, cx, cy) {
  if(!chord) return '';
  const m = chord.match(/^([A-G][b#]?)(.*)$/);
  if(!m) return `<text x="${cx}" y="${cy}" font-family="IBM Plex Mono" font-size="22" font-weight="700" text-anchor="middle" dominant-baseline="central">${chord}</text>`;
  
  const root = m[1], qual = m[2] || '';
  // Formatação Jazz: Triângulos e Círculos cortados
  const displayQual = qual.replace(/maj7/gi,'Δ7').replace(/m7b5/gi,'ø7');
  
  return `
    <text x="${cx}" y="${cy}" font-family="IBM Plex Mono" font-size="24" font-weight="700" text-anchor="middle" dominant-baseline="central">
      ${root}<tspan dy="-10" font-size="12" font-weight="400">${displayQual}</tspan>
    </text>
  `;
}

function renderSystem(row, label, isFirst, isLast, isRep) {
  let svg = `<svg viewBox="0 -25 ${W} ${H+25}" style="overflow:visible; display:block; width:100%">`;
  const midY = H/2;

  // Linhas da Pauta (Contínuas)
  svg += svgLine(0, 0, W, 0, 1.8, '#161310');
  svg += svgLine(0, H, W, H, 1.8, '#161310');

  // Barras de Compasso Internas
  for(let i=1; i<4; i++) svg += svgLine(i*barW, 0, i*barW, H, 0.8, '#2a2620');

  // Barras Laterais (Início e Fim)
  if(isRep && isFirst) {
    svg += `<rect x="0" y="0" width="5" height="${H}" fill="#161310" />`;
    svg += svgLine(8, 0, 8, H, 1, '#161310');
    svg += `<circle cx="16" cy="${midY-7}" r="2.5" /> <circle cx="16" cy="${midY+7}" r="2.5" />`;
  } else {
    svg += svgLine(0, 0, 0, H, 2.5, '#161310');
  }

  if(isRep && isLast) {
    svg += svgLine(W-8, 0, W-8, H, 1, '#161310');
    svg += `<rect x="${W-5}" y="0" width="5" height="${H}" fill="#161310" />`;
    svg += `<circle cx="${W-16}" cy="${midY-7}" r="2.5" /> <circle cx="${W-16}" cy="${midY+7}" r="2.5" />`;
  } else {
    svg += svgLine(W, 0, W, H, 2.5, '#161310');
  }

  // Marcas de Seção (A, B, C)
  if(label) {
    svg += `
      <rect x="0" y="-22" width="20" height="20" fill="#161310" />
      <text x="10" y="-12" fill="#fff" font-family="serif" font-weight="700" font-size="12" text-anchor="middle" dominant-baseline="central">${label}</text>
    `;
  }

  // Conteúdo
  row.forEach((chord, i) => {
    const cx = i*barW + barW/2;
    if(!chord || chord === '%') svg += drawMeasureRepeat(cx, midY);
    else svg += chordText(chord, cx, midY);
  });

  return svg + `</svg>`;
}

  const text = document.getElementById('cifraIn').value;
  const out = document.getElementById('out');
  const title = document.getElementById('iTitle').value || 'Sem Título';
  const artist = document.getElementById('iArtist').value || '';
  const key = document.getElementById('iKey').value || '';

  let html = `<div class="rb-title">${title}</div>`;
  if(artist) html += `<div class="rb-artist">${artist}</div>`;
  if(key)
