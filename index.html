<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Roadmap Maker PRO - RealBook Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #f3f4f6; --accent: #2563eb; --border: #d1d5db; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #fff; height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); justify-content: space-between; z-index: 10; }
        .logo { font-weight: 800; color: var(--accent); font-size: 16px; display: flex; align-items: center; gap: 10px; }
        
        .app-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: margin-left 0.3s ease; }
        .sidebar.hidden { margin-left: -240px; }
        
        .workspace { flex: 1; display: grid; grid-template-columns: 420px 1fr; overflow: hidden; }
        .editor-panel { background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 14px; border: none; background: none; font-size: 11px; font-weight: 700; cursor: pointer; color: #6b7280; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        .tab-content { flex: 1; display: none; padding: 20px; flex-direction: column; gap: 15px; overflow-y: auto; }
        .tab-content.active { display: flex; }
        
        textarea { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: monospace; font-size: 13px; line-height: 1.6; outline: none; background: #fafafa; resize: none; }
        input[type="text"] { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; }

        /* PREVIEW - ESTILO CHORDSHEET.COM */
        .preview-area { flex: 1; overflow-y: auto; padding: 40px; background: #cbd5e1; display: flex; justify-content: center; }
        #paper-container { background: #fff; width: 210mm; min-height: 297mm; padding: 1.5cm 2cm; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .rb-title { font-size: 32px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .rb-sub { font-size: 18px; color: #444; margin-bottom: 15px; }
        .rb-hr { border: none; border-top: 2.5px solid #000; margin-bottom: 25px; }

        /* Estilo da Pauta Aberta */
        .rb-section-title { font-family: 'Patrick Hand', cursive; font-size: 20px; margin: 25px 0 8px 0; font-weight: 400; }
        .system-svg { display: block; width: 100%; margin-top: -1.2px; }

        .btn-ui { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 11px; font-weight: 700; background: #f3f4f6; }
        .btn-primary { background: var(--accent); color: #fff; border: none; }

        @media print {
            header, .sidebar, .editor-panel { display: none !important; }
            .preview-area { padding: 0; background: white; }
            #paper-container { box-shadow: none; width: 100%; padding: 1.5cm; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><button class="btn-ui" onclick="toggleSB()">☰ MENU</button> ROADMAP MAKER PRO</div>
    <div style="display:flex; gap:10px">
        <button class="btn-ui" onclick="render()">⚡ ATUALIZAR</button>
        <button class="btn-ui btn-primary" onclick="exportPDF()">EXPORTAR PDF</button>
    </div>
</header>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <button class="btn-ui" style="margin:15px; background:var(--accent); color:#fff; border:none; height: 40px;" onclick="newSong()">+ NOVA MÚSICA</button>
        <div id="songList" style="flex:1; overflow-y:auto; padding:10px"></div>
    </div>

    <div class="workspace">
        <div class="editor-panel">
            <div class="tabs">
                <button class="tab active" onclick="setTab('raw', this)">01. CIFRA BRUTA</button>
                <button class="tab" onclick="setTab('map', this)">02. MAPA DE TEXTO</button>
            </div>
            <div id="t-raw" class="tab-content active">
                <div style="display:grid; grid-template-columns: 1fr 1fr 60px; gap:8px">
                    <input type="text" id="m-title" placeholder="Título" oninput="save()">
                    <input type="text" id="m-artist" placeholder="Artista" oninput="save()">
                    <input type="text" id="m-key" placeholder="Tom" oninput="save()">
                </div>
                <textarea id="raw-in" oninput="autoClean()" placeholder="Cole a cifra aqui..."></textarea>
            </div>
            <div id="t-map" class="tab-content">
                <textarea id="map-in" oninput="save(); render();" placeholder="Edite o mapa rítmico aqui..."></textarea>
            </div>
        </div>

        <div class="preview-area">
            <div id="paper-container">
                <div id="out"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('roadmap_v30')) || [];
    let activeId = null;
    const W = 600, H = 60, barW = W/4;

    function toggleSB() { document.getElementById('sidebar').classList.toggle('hidden'); }
    function setTab(t, el) {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        el.classList.add('active'); document.getElementById('t-' + t).classList.add('active');
    }

    function autoClean() {
        const raw = document.getElementById('raw-in').value;
        const lines = raw.split('\n');
        let res = [];
        lines.forEach(l => {
            let t = l.trim(); if (!t) return;
            let s = t.match(/\[(.*?)\]/);
            if (s) { res.push(`: ${s[1]}`); return; }
            const c = t.match(/\b([A-G][b#]?(maj7|m7b5|ø7|m7|7|Δ7|dim7|m|sus4|add9|9|C9|4|D4)?)\b/g);
            if (c) res.push(c.join('  '));
        });
        document.getElementById('map-in').value = res.join('\n');
        save(); render();
    }

    function renderSVGSystem(line, isRep) {
        // SVG com overflow visível para as tensões dos acordes
        let svg = `<svg viewBox="0 -15 ${W} ${H+15}" class="system-svg" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">`;
        const midY = H/2;

        // LINHAS DA PAUTA (Apenas horizontais, estilo aberto)
        svg += `<line x1="0" y1="0" x2="${W}" y2="0" stroke="black" stroke-width="1.2"/>`;
        svg += `<line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="black" stroke-width="1.2"/>`;

        // BARLINES (Verticais - Traço puro)
        for (let i = 0; i <= 4; i++) {
            let sw = (i === 0 || i === 4) ? 2.5 : 0.8;
            svg += `<line x1="${i*barW}" y1="0" x2="${i*barW}" y2="${H}" stroke="black" stroke-width="${sw}"/>`;
        }

        // RITORNELLO (Repetição)
        if (isRep) {
            svg += `<rect x="0" y="0" width="5" height="${H}" fill="black"/>`;
            svg += `<circle cx="14" cy="${midY-8}" r="2.8" fill="black"/><circle cx="14" cy="${midY+8}" r="2.8" fill="black"/>`;
        }

        const chords = line.trim().split(/\s+/).slice(0, 4);
        chords.forEach((chord, i) => {
            const cx = i * barW + barW / 2;
            if (chord === '%' || !chord) {
                // Símbolo de repetição vetorial
                svg += `<line x1="${cx-10}" y1="${midY+10}" x2="${cx+10}" y2="${midY-10}" stroke="#999" stroke-width="1.8"/>`;
                svg += `<circle cx="${cx-7}" cy="${midY-7}" r="2.2" fill="#999"/><circle cx="${cx+7}" cy="${midY+7}" r="2.2" fill="#999"/>`;
            } else {
                // Inteligência de Formatação (Nota + Tensão)
                let m = chord.match(/^([A-G][b#]?)(.*)$/);
                if (m) {
                    let root = m[1], qual = m[2].replace(/maj7/gi,'Δ7').replace(/m7b5/gi,'ø7');
                    svg += `<text x="${cx}" y="${midY+5}" font-family="Patrick Hand" font-size="34" text-anchor="middle" fill="black">
                                ${root}<tspan dy="-12" font-size="18">${qual}</tspan>
                            </text>`;
                }
            }
        });

        return svg + `</svg>`;
    }

    function render() {
        const out = document.getElementById('out');
        const title = document.getElementById('m-title').value || 'SEM TÍTULO';
        const artist = document.getElementById('m-artist').value || 'Artista';
        const key = document.getElementById('m-key').value || '';
        const map = document.getElementById('map-in').value;

        let html = `<div class="rb-title">${title}</div><div class="rb-sub">${artist} ${key ? '• Tom: '+key : ''}</div><hr class="rb-hr">`;

        const lines = map.split('\n').map(l => l.trim()).filter(l => l !== "");
        lines.forEach(line => {
            if (line.startsWith(':')) {
                html += `<div class="rb-section-title">${line.replace(':', '').trim()}</div>`;
            } else {
                const isRep = line.includes('(') || line.includes('x');
                const cleanLine = line.replace(/[()]/g,'').replace(/ x\d+/,'');
                html += renderSVGSystem(cleanLine, isRep);
            }
        });
        out.innerHTML = html;
    }

    function save() {
        if (!activeId) return;
        const s = songs.find(x => x.id === activeId);
        s.title = document.getElementById('m-title').value;
        s.artist = document.getElementById('m-artist').value;
        s.key = document.getElementById('m-key').value;
        s.raw = document.getElementById('raw-in').value;
        s.map = document.getElementById('map-in').value;
        localStorage.setItem('roadmap_v30', JSON.stringify(songs));
        renderList();
    }

    function loadSong(id) {
        activeId = id; const s = songs.find(x => x.id === id);
        document.getElementById('m-title').value = s.title;
        document.getElementById('m-artist').value = s.artist;
        document.getElementById('m-key').value = s.key;
        document.getElementById('raw-in').value = s.raw;
        document.getElementById('map-in').value = s.map;
        renderList(); render();
    }

    function renderList() {
        document.getElementById('songList').innerHTML = songs.map(s => `
            <div style="padding:10px; cursor:pointer; font-size:13px; border-bottom:1px solid #eee; background:${s.id===activeId?'#eff6ff':''}" onclick="loadSong(${s.id})">
                ${s.title || 'Música'}
            </div>`).join('');
    }

    function newSong() {
        let s = { id: Date.now(), title: '', artist: '', key: '', raw: '', map: '' };
        songs.unshift(s); loadSong(s.id);
    }

    function exportPDF() {
        const element = document.getElementById('paper-container');
        html2pdf().from(element).set({
            margin: 0,
            filename: `${document.getElementById('m-title').value || 'roadmap'}.pdf`,
            html2canvas: { scale: 3, backgroundColor: '#ffffff' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).save();
    }

    if(songs.length > 0) loadSong(songs[0].id); else newSong();
</script>
</body>
</html>
