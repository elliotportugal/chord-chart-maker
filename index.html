<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Maker Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@400;600;800&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --sidebar-bg: #ffffff;
            --border: #e9ecef;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent: #4361ee;
            --accent-soft: #eef2ff;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { 
            background: var(--white); 
            height: 60px; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            border-bottom: 1px solid var(--border); 
            justify-content: space-between; 
            z-index: 100;
        }
        .logo { font-weight: 800; font-size: 18px; color: var(--accent); letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .btn-toggle-sidebar { background: var(--accent-soft); border: none; padding: 8px; border-radius: 6px; cursor: pointer; color: var(--accent); font-size: 12px; font-weight: 600; }

        /* Layout Container */
        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* Sidebar */
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .sidebar.hidden { margin-left: -260px; }
        .sidebar-header { padding: 20px; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        #songList { flex: 1; overflow-y: auto; padding: 0 10px; }
        .song-item { 
            padding: 12px 15px; 
            margin-bottom: 4px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .song-item:hover { background: var(--bg); }
        .song-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
        .btn-add { margin: 20px; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Main Workspace */
        .workspace { flex: 1; display: grid; grid-template-columns: 450px 1fr; overflow: hidden; background: var(--bg); }
        
        /* Left Panel: Editor with Tabs */
        .editor-panel { background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 10px; background: #fff; }
        .tab-btn { padding: 15px 20px; border: none; background: none; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { flex: 1; display: none; flex-direction: column; padding: 20px; }
        .tab-content.active { display: flex; }

        /* Form Elements */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
        input[type="text"]:focus { border-color: var(--accent); }
        textarea { flex: 1; width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; background: #fafafa; }

        /* Right Panel: Grid Preview */
        .preview-panel { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .rb-page { 
            background: white; 
            width: 210mm; 
            min-height: 297mm; 
            padding: 2cm; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            color: #000;
            font-family: 'Patrick Hand', cursive;
        }

        /* SVG Musical Content */
        .rb-system-wrap { margin-top: -1.2px; break-inside: avoid; }
        .rb-sec-label { font-size: 20px; margin: 25px 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }

        .btn-action { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: white; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-primary { background: var(--accent); color: white; border: none; }

        @media print {
            .sidebar, header, .editor-panel, .tabs { display: none !important; }
            .workspace { display: block; }
            .preview-panel { padding: 0; background: white; }
            .rb-page { box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <button class="btn-toggle-sidebar" onclick="toggleSidebar()">☰ MENU</button>
        ROADMAP MAKER
    </div>
    <div style="display:flex; gap:10px">
        <button class="btn-action" onclick="window.print()">IMPRIMIR</button>
        <button class="btn-action btn-primary" onclick="exportPDF()">SALVAR PDF</button>
    </div>
</header>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Minhas Músicas</div>
        <div id="songList"></div>
        <button class="btn-add" onclick="createNewSong()">+ Nova Música</button>
    </div>

    <div class="workspace">
        <div class="editor-panel">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('raw')">CIFRA BRUTA</button>
                <button class="tab-btn" onclick="switchTab('map')">MAPA DE TEXTO</button>
            </div>

            <div id="tab-raw" class="tab-content active">
                <div class="input-group">
                    <label>Dados da Música</label>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 60px; gap:10px">
                        <input type="text" id="iTitle" placeholder="Título" oninput="save()">
                        <input type="text" id="iArtist" placeholder="Artista" oninput="save()">
                        <input type="text" id="iKey" placeholder="Tom" oninput="save()">
                    </div>
                </div>
                <label>Cole a cifra aqui</label>
                <textarea id="cifraBruta" oninput="autoClean()" placeholder="Ex: [Intro] G C D..."></textarea>
            </div>

            <div id="tab-map" class="tab-content">
                <label>Edição do Roteiro</label>
                <textarea id="csEdit" oninput="save(); update();" placeholder=": Intro&#10;G C D G"></textarea>
                <p style="font-size: 11px; color: #999; margin-top: 10px;">Use ":" para seções. Ex: ": Refrão"</p>
            </div>
        </div>

        <div class="preview-panel">
            <div id="out" class="rb-page">
                </div>
        </div>
    </div>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('roadmap_modern_v1')) || [];
    let currentId = null;
    const W = 600, H = 60, barW = W/4;

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('hidden');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }

    function autoClean() {
        const raw = document.getElementById('cifraBruta').value;
        const lines = raw.split('\n');
        let map = [];
        lines.forEach(l => {
            let t = l.trim();
            if (!t) return;
            let sec = t.match(/\[(.*?)\]/);
            if (sec) { map.push(`: ${sec[1]}`); return; }
            const chords = t.match(/\b([A-G][b#]?(maj7|m7b5|ø7|m7|7|Δ7|dim7|m|sus4|add9|9|C9|4|D4)?)\b/g);
            if (chords) map.push(chords.join('  '));
        });
        document.getElementById('csEdit').value = map.join('\n');
        save(); update();
    }

    function renderSVG(line, isRep) {
        let svg = `<svg viewBox="0 -5 ${W} ${H+10}" xmlns="http://www.w3.org/2000/svg" style="display:block; width:100%; overflow:visible;">`;
        const midY = H/2;
        
        // Pautas Abertas (Sem as bordas laterais fechadas)
        svg += `<line x1="0" y1="0" x2="${W}" y2="0" stroke="black" stroke-width="1.2"/>`;
        svg += `<line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="black" stroke-width="1.2"/>`;
        
        for(let i=0; i<=4; i++) {
            let sw = (i === 0 || i === 4) ? 2 : 0.8;
            svg += `<line x1="${i*barW}" y1="0" x2="${i*barW}" y2="${H}" stroke="black" stroke-width="${sw}"/>`;
        }

        if(isRep) {
            svg += `<rect x="0" y="0" width="4" height="${H}" fill="black"/>`;
            svg += `<circle cx="12" cy="${midY-8}" r="2.5" fill="black"/><circle cx="12" cy="${midY+8}" r="2.5" fill="black"/>`;
        }

        const chords = line.trim().split(/\s+/).slice(0, 4);
        chords.forEach((chord, i) => {
            const cx = i * barW + barW / 2;
            if (chord === '%' || !chord) {
                svg += `<line x1="${cx-8}" y1="${midY+8}" x2="${cx+8}" y2="${midY-8}" stroke="#bbb" stroke-width="1.5"/>`;
                svg += `<circle cx="${cx-5}" cy="${midY-5}" r="1.8" fill="#bbb"/><circle cx="${cx+5}" cy="${midY+5}" r="1.8" fill="#bbb"/>`;
            } else {
                let m = chord.match(/^([A-G][b#]?)(.*)$/);
                if(m) {
                    let q = m[2].replace(/maj7/gi,'Δ7').replace(/m7b5/gi,'ø7');
                    svg += `<text x="${cx}" y="${midY+5}" font-family="Patrick Hand" font-size="32" text-anchor="middle" fill="#000">${m[1]}<tspan dy="-12" font-size="18">${q}</tspan></text>`;
                }
            }
        });
        return svg + `</svg>`;
    }

    function update() {
        const out = document.getElementById('out');
        const title = document.getElementById('iTitle').value || 'SEM TÍTULO';
        const artist = document.getElementById('iArtist').value || 'ARTISTA';
        const key = document.getElementById('iKey').value || '';
        const text = document.getElementById('csEdit').value;

        let html = `<div style="text-align:center; margin-bottom:30px">
                        <h1 class="rb-title">${title}</h1>
                        <p class="rb-sub">${artist} ${key ? '• Tom: '+key : ''}</p>
                    </div>`;

        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
        let grid = "";

        lines.forEach((line, idx) => {
            if (line.startsWith(':')) {
                grid += `<div class="rb-sec-group"><div class="rb-sec-label">${line.replace(':', '').trim()}</div>`;
            } else {
                const isRep = line.includes('(') || line.includes('x');
                const cleanLine = line.replace(/[()]/g,'').replace(/ x\d+/,'');
                grid += `<div class="rb-system-wrap">${renderSVG(cleanLine, isRep)}</div>`;
                if (lines[idx+1] && lines[idx+1].startsWith(':')) grid += `</div>`;
            }
        });
        out.innerHTML = html + grid;
    }

    function createNewSong() {
        let s = { id: Date.now(), title: 'Nova Música', artist: '', key: '', raw: '', clean: '' };
        songs.unshift(s); loadSong(s.id);
    }

    function loadSong(id) {
        currentId = id; const s = songs.find(x => x.id === id);
        if (!s) return;
        document.getElementById('iTitle').value = s.title || '';
        document.getElementById('iArtist').value = s.artist || '';
        document.getElementById('iKey').value = s.key || '';
        document.getElementById('cifraBruta').value = s.raw || '';
        document.getElementById('csEdit').value = s.clean || '';
        renderSongs(); update();
    }

    function save() {
        if (!currentId) return; const s = songs.find(x => x.id === currentId);
        s.title = document.getElementById('iTitle').value;
        s.artist = document.getElementById('iArtist').value;
        s.key = document.getElementById('iKey').value;
        s.raw = document.getElementById('cifraBruta').value;
        s.clean = document.getElementById('csEdit').value;
        localStorage.setItem('roadmap_modern_v1', JSON.stringify(songs));
        renderSongs();
    }

    function renderSongs() {
        document.getElementById('songList').innerHTML = songs.map(s => `
            <div class="song-item ${s.id===currentId?'active':''}" onclick="loadSong(${s.id})">
                ${s.title || 'Sem título'}
            </div>`).join('');
    }

    function exportPDF() {
        const element = document.getElementById('out');
        const opt = { margin: 0, filename: 'roadmap.pdf', jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save();
    }

    if(songs.length > 0) loadSong(songs[0].id); else createNewSong();
</script>
</body>
</html>
