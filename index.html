<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Chord Roadmap Canvas Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #f3f4f6; --accent: #2563eb; --border: #d1d5db; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #fff; height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); justify-content: space-between; }
        .app-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar e Editor */
        .sidebar { width: 220px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .editor { width: 400px; background: #fff; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        textarea { flex: 1; padding: 15px; font-family: monospace; border: 1px solid var(--border); border-radius: 8px; resize: none; outline: none; background: #fafafa; }
        
        /* Preview Paper */
        .preview-area { flex: 1; overflow-y: auto; padding: 40px; background: #d1d5db; display: flex; justify-content: center; }
        #canvas-container { 
            background: #fff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            padding: 2cm;
            width: 210mm;
            min-height: 297mm;
        }
        canvas { display: block; width: 100%; height: auto; }

        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-weight: 700; font-size: 11px; }
        .btn-primary { background: var(--accent); color: #fff; border: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; color: var(--accent)">CHORD ROADMAP CANVAS</div>
    <div style="display:flex; gap:10px">
        <button class="btn" onclick="render()">⚡ ATUALIZAR</button>
        <button class="btn btn-primary" onclick="exportPDF()">SALVAR PDF</button>
    </div>
</header>

<div class="app-container">
    <div class="sidebar">
        <div id="songList" style="padding:10px"></div>
    </div>
    
    <div class="editor">
        <input type="text" id="m-title" placeholder="Título da Música" style="padding:10px; border:1px solid var(--border); border-radius:6px">
        <textarea id="map-in" placeholder=": Intro&#10;G C D C&#10;G Em C D" oninput="render()"></textarea>
    </div>

    <div class="preview-area">
        <div id="canvas-container">
            <canvas id="roadmapCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('roadmapCanvas');
    const ctx = canvas.getContext('2d');

    // Configurações A4 em alta densidade (300DPI aprox)
    const scale = 2; 
    const width = 800 * scale;
    const rowH = 80 * scale;
    const marginX = 40 * scale;

    function render() {
        const text = document.getElementById('map-in').value;
        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
        
        // Ajustar altura do canvas dinamicamente
        canvas.width = width;
        canvas.height = Math.max(1200, (lines.length + 5) * rowH);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let currentY = 100 * scale;

        // Título
        ctx.fillStyle = "black";
        ctx.font = `bold ${30 * scale}px Libre Baskerville, serif`;
        ctx.fillText(document.getElementById('m-title').value.toUpperCase() || "SEM TÍTULO", marginX, currentY);
        currentY += 15 * scale;
        ctx.lineWidth = 3 * scale;
        ctx.beginPath(); ctx.moveTo(marginX, currentY); ctx.lineTo(width - marginX, currentY); ctx.stroke();
        currentY += 50 * scale;

        lines.forEach(line => {
            if (line.startsWith(':')) {
                // Nome da Secção
                currentY += 20 * scale;
                ctx.font = `${18 * scale}px Patrick Hand, cursive`;
                ctx.fillText(line.replace(':', '').trim(), marginX, currentY);
                currentY += 15 * scale;
            } else {
                drawSystem(line, currentY);
                currentY += rowH;
            }
        });
    }

    function drawSystem(line, y) {
        const barW = (width - 2 * marginX) / 4;
        
        ctx.strokeStyle = "black";
        ctx.lineWidth = 1.5 * scale;

        // LINHAS DA PAUTA (Contínuas)
        ctx.beginPath();
        ctx.moveTo(marginX, y); ctx.lineTo(width - marginX, y); // Cima
        ctx.moveTo(marginX, y + rowH); ctx.lineTo(width - marginX, y + rowH); // Baixo
        ctx.stroke();

        // BARLINES
        for (let i = 0; i <= 4; i++) {
            ctx.lineWidth = (i === 0 || i === 4) ? 3 * scale : 1 * scale;
            ctx.beginPath();
            ctx.moveTo(marginX + i * barW, y);
            ctx.lineTo(marginX + i * barW, y + rowH);
            ctx.stroke();
        }

        // ACORDES
        const chords = line.split(/\s+/).slice(0, 4);
        ctx.font = `${32 * scale}px Patrick Hand, cursive`;
        ctx.textAlign = "center";
        
        chords.forEach((chord, i) => {
            const cx = marginX + i * barW + barW / 2;
            const midY = y + rowH / 2 + 8 * scale;
            
            if (chord === '%') {
                ctx.strokeStyle = "#999";
                ctx.beginPath(); ctx.moveTo(cx - 10*scale, midY + 10*scale); ctx.lineTo(cx + 10*scale, midY - 10*scale); ctx.stroke();
                ctx.fillStyle = "#999";
                ctx.beginPath(); ctx.arc(cx - 6*scale, midY - 6*scale, 2*scale, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 6*scale, midY + 6*scale, 2*scale, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = "black";
                ctx.fillText(chord, cx, midY);
            }
        });
    }

    function exportPDF() {
        const element = document.getElementById('canvas-container');
        html2pdf().from(element).save();
    }

    render();
</script>
</body>
</html>
