<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Roadmap Maker PRO - Canvas Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #f3f4f6; --accent: #2563eb; --border: #d1d5db; --text: #1f2937; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #fff; height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); justify-content: space-between; z-index: 10; }
        .logo { font-weight: 800; color: var(--accent); font-size: 16px; display: flex; align-items: center; gap: 10px; }
        
        .app-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: margin-left 0.3s ease; }
        .sidebar.hidden { margin-left: -240px; }
        
        .workspace { flex: 1; display: grid; grid-template-columns: 420px 1fr; overflow: hidden; }
        .editor-panel { background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 14px; border: none; background: none; font-size: 11px; font-weight: 700; cursor: pointer; color: #6b7280; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        .tab-content { flex: 1; display: none; padding: 20px; flex-direction: column; gap: 15px; overflow-y: auto; }
        .tab-content.active { display: flex; }
        
        textarea { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: monospace; font-size: 13px; line-height: 1.6; outline: none; background: #fafafa; resize: none; }
        input[type="text"] { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; }

        /* Preview Area */
        .preview-area { flex: 1; overflow-y: auto; padding: 40px; background: #cbd5e1; display: flex; justify-content: center; }
        #paper-container { background: #fff; width: 210mm; min-height: 297mm; padding: 1.5cm 2cm; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        canvas { width: 100%; height: auto; display: block; }

        .btn-ui { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 11px; font-weight: 700; background: #f3f4f6; }
        .btn-primary { background: var(--accent); color: #fff; border: none; }

        @media print {
            header, .sidebar, .editor-panel { display: none !important; }
            .preview-area { padding: 0; background: white; }
            #paper-container { box-shadow: none; width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><button class="btn-ui" onclick="toggleSB()">☰ MENU</button> ROADMAP MAKER PRO</div>
    <div style="display:flex; gap:10px">
        <button class="btn-ui" onclick="render()">⚡ ATUALIZAR GRADE</button>
        <button class="btn-ui btn-primary" onclick="exportPDF()">EXPORTAR PDF</button>
    </div>
</header>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <button class="btn-ui" style="margin:15px; background:var(--accent); color:#fff; border:none; height: 40px;" onclick="newSong()">+ NOVA MÚSICA</button>
        <div id="songList" style="flex:1; overflow-y:auto; padding:10px"></div>
    </div>

    <div class="workspace">
        <div class="editor-panel">
            <div class="tabs">
                <button class="tab active" onclick="setTab('raw', this)">01. CIFRA BRUTA</button>
                <button class="tab" onclick="setTab('map', this)">02. MAPA DE TEXTO</button>
            </div>
            <div id="t-raw" class="tab-content active">
                <div style="display:grid; grid-template-columns: 1fr 1fr 60px; gap:8px">
                    <input type="text" id="m-title" placeholder="Título" oninput="save()">
                    <input type="text" id="m-artist" placeholder="Artista" oninput="save()">
                    <input type="text" id="m-key" placeholder="Tom" oninput="save()">
                </div>
                <textarea id="raw-in" oninput="autoClean()" placeholder="Cole a cifra do CifraClub aqui..."></textarea>
            </div>
            <div id="t-map" class="tab-content">
                <textarea id="map-in" oninput="save(); render();" placeholder="Ex:&#10;: Intro&#10;G  C  D  C"></textarea>
                <p style="font-size: 11px; color: #999">Dica: Use ":" para seções e "(" ")" x2 para repetições.</p>
            </div>
        </div>

        <div class="preview-area">
            <div id="paper-container">
                <canvas id="roadmapCanvas"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('roadmap_v25')) || [];
    let activeId = null;
    const canvas = document.getElementById('roadmapCanvas');
    const ctx = canvas.getContext('2d');
    
    const scale = 3; // Ultra resolução para o PDF não pixelar
    const width = 800 * scale;
    const rowH = 70 * scale;
    const marginX = 50 * scale;

    function toggleSB() { document.getElementById('sidebar').classList.toggle('hidden'); }
    function setTab(t, el) {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        el.classList.add('active'); document.getElementById('t-' + t).classList.add('active');
    }

    function autoClean() {
        const raw = document.getElementById('raw-in').value;
        const lines = raw.split('\n');
        let res = [];
        lines.forEach(l => {
            let t = l.trim(); if (!t) return;
            let s = t.match(/\[(.*?)\]/);
            if (s) { res.push(`: ${s[1]}`); return; }
            const c = t.match(/\b([A-G][b#]?(maj7|m7b5|ø7|m7|7|Δ7|dim7|m|sus4|add9|9|C9|4|D4)?)\b/g);
            if (c) res.push(c.join('  '));
        });
        document.getElementById('map-in').value = res.join('\n');
        save(); render();
    }

    function render() {
        const text = document.getElementById('map-in').value;
        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
        
        canvas.width = width;
        canvas.height = Math.max(1200 * scale, (lines.length + 8) * rowH);
        
        // Fundo branco absoluto (elimina sombras cinzas no PDF)
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let curY = 80 * scale;

        // Cabeçalho ChordSheet Style
        ctx.fillStyle = "black";
        ctx.font = `bold ${32 * scale}px Inter`;
        ctx.fillText((document.getElementById('m-title').value || "SEM TÍTULO").toUpperCase(), marginX, curY);
        curY += 22 * scale;
        
        ctx.font = `${16 * scale}px Inter`;
        ctx.fillStyle = "#444";
        ctx.fillText(`${document.getElementById('m-artist').value} | Tom: ${document.getElementById('m-key').value}`, marginX, curY);
        
        curY += 15 * scale;
        ctx.lineWidth = 2.5 * scale;
        ctx.beginPath(); ctx.moveTo(marginX, curY); ctx.lineTo(width - marginX, curY); ctx.stroke();
        curY += 50 * scale;

        lines.forEach(line => {
            if (line.startsWith(':')) {
                curY += 30 * scale;
                ctx.fillStyle = "black";
                ctx.font = `bold ${18 * scale}px Patrick Hand`;
                ctx.fillText(line.replace(':', '').trim(), marginX, curY);
                curY += 12 * scale;
            } else {
                drawSystem(line, curY);
                curY += rowH;
            }
        });
    }

    function drawSystem(line, y) {
        const barW = (width - 2 * marginX) / 4;
        ctx.strokeStyle = "black";
        
        // Pauta - Apenas linhas horizontais finas
        ctx.lineWidth = 1 * scale;
        ctx.beginPath();
        ctx.moveTo(marginX, y); ctx.lineTo(width - marginX, y);
        ctx.moveTo(marginX, y + rowH); ctx.lineTo(width - marginX, y + rowH);
        ctx.stroke();

        // Barlines - Sem fechar caixa lateral
        for (let i = 0; i <= 4; i++) {
            ctx.lineWidth = (i === 0 || i === 4) ? 2.5 * scale : 0.8 * scale;
            ctx.beginPath();
            ctx.moveTo(marginX + i * barW, y);
            ctx.lineTo(marginX + i * barW, y + rowH);
            ctx.stroke();
        }

        const isRep = line.includes('(') || line.includes('x');
        if (isRep) {
            ctx.fillStyle = "black";
            ctx.fillRect(marginX, y, 5 * scale, rowH); // Bloco de repetição
            ctx.beginPath();
            ctx.arc(marginX + 15 * scale, y + rowH/2 - 8 * scale, 2.5 * scale, 0, Math.PI * 2);
            ctx.arc(marginX + 15 * scale, y + rowH/2 + 8 * scale, 2.5 * scale, 0, Math.PI * 2);
            ctx.fill();
        }

        const chords = line.replace(/[()]/g,'').split(/\s+/).slice(0, 4);
        ctx.font = `${34 * scale}px Patrick Hand`;
        ctx.textAlign = "center";
        ctx.fillStyle = "black";

        chords.forEach((chord, i) => {
            const cx = marginX + i * barW + barW / 2;
            const midY = y + rowH / 2 + 10 * scale;
            if (chord === '%' || !chord) {
                ctx.strokeStyle = "#999"; ctx.lineWidth = 2*scale;
                ctx.beginPath(); ctx.moveTo(cx-12*scale, midY+10*scale); ctx.lineTo(cx+12*scale, midY-12*scale); ctx.stroke();
            } else {
                ctx.fillText(chord, cx, midY);
            }
        });
    }

    // Gerenciamento de músicas
    function save() {
        if (!activeId) return;
        const s = songs.find(x => x.id === activeId);
        s.title = document.getElementById('m-title').value;
        s.artist = document.getElementById('m-artist').value;
        s.key = document.getElementById('m-key').value;
        s.raw = document.getElementById('raw-in').value;
        s.map = document.getElementById('map-in').value;
        localStorage.setItem('roadmap_v25', JSON.stringify(songs));
        renderList();
    }

    function loadSong(id) {
        activeId = id; const s = songs.find(x => x.id === id);
        document.getElementById('m-title').value = s.title;
        document.getElementById('m-artist').value = s.artist;
        document.getElementById('m-key').value = s.key;
        document.getElementById('raw-in').value = s.raw;
        document.getElementById('map-in').value = s.map;
        renderList(); render();
    }

    function renderList() {
        document.getElementById('songList').innerHTML = songs.map(s => `
            <div style="padding:12px; cursor:pointer; font-size:13px; border-radius:6px; margin-bottom:4px; background:${s.id===activeId?'#eff6ff':'transparent'}" onclick="loadSong(${s.id})">
                ${s.title || 'Música'}
            </div>`).join('');
    }

    function newSong() {
        let s = { id: Date.now(), title: '', artist: '', key: '', raw: '', map: '' };
        songs.unshift(s); loadSong(s.id);
    }

    function exportPDF() {
        const element = document.getElementById('paper-container');
        html2pdf().from(element).set({
            margin: 0,
            filename: `${document.getElementById('m-title').value || 'roadmap'}.pdf`,
            html2canvas: { scale: 3, backgroundColor: '#ffffff' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).save();
    }

    if(songs.length > 0) loadSong(songs[0].id); else newSong();
</script>
</body>
</html>
