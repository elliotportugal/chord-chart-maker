<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Roadmap Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@400;600;800&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #f5f7fa;
            --sidebar-bg: #ffffff;
            --border: #d1d5db;
            --text-main: #1f2937;
            --accent: #2563eb;
            --paper: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: #fff; height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); justify-content: space-between; z-index: 10; }
        .logo { font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 12px; font-size: 16px; }
        .btn-ui { background: #f3f4f6; border: 1px solid var(--border); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; color: #374151; }

        .app-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar Retrátil */
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s ease, margin-left 0.3s ease; flex-shrink: 0; }
        .sidebar.hidden { margin-left: -250px; }
        .sb-list { flex: 1; overflow-y: auto; padding: 10px; }
        .sb-item { padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 4px; display: flex; justify-content: space-between; border: 1px solid transparent; }
        .sb-item.active { background: #eff6ff; color: var(--accent); border-color: #bfdbfe; font-weight: 600; }
        .btn-new { margin: 15px; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }

        /* Workspace Grid */
        .workspace { flex: 1; display: grid; grid-template-columns: 400px 1fr; overflow: hidden; }
        .editor-panel { background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 14px; border: none; background: none; font-size: 11px; font-weight: 700; color: #6b7280; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { flex: 1; display: none; flex-direction: column; padding: 20px; }
        .tab-content.active { display: flex; }

        textarea { flex: 1; width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; background: #fafafa; color: #374151; }
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr 60px; gap: 8px; margin-bottom: 15px; }
        .meta-grid input { padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; outline: none; }

        /* Preview Area - "The Paper" */
        .preview-area { flex: 1; overflow-y: auto; padding: 40px; background: #e5e7eb; display: flex; flex-direction: column; align-items: center; }
        .paper { 
            background: #fff; 
            width: 210mm; 
            min-height: 297mm; 
            padding: 2cm; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            color: #000; 
            font-family: 'Patrick Hand', cursive;
        }

        /* Títulos Estilo ChordSheet */
        .p-title { font-size: 32px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; border-bottom: 2.5px solid #000; padding-bottom: 5px; }
        .p-artist { font-size: 18px; color: #444; margin-bottom: 25px; }
        .p-section { font-size: 20px; margin: 30px 0 10px 0; color: #000; border-bottom: 1px solid #eee; }

        /* Estilo da Grade: SEM TABELAS, APENAS PAUTAS */
        .p-system { margin-top: -1px; break-inside: avoid; }

        @media print {
            body { background: white; }
            header, .sidebar, .editor-panel { display: none !important; }
            .preview-area { padding: 0; background: white; }
            .paper { box-shadow: none; width: 100%; padding: 1cm; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <button class="btn-ui" onclick="toggleSB()">☰ MENU</button>
        CHORD ROADMAP PRO
    </div>
    <div style="display:flex; gap:10px">
        <button class="btn-ui" onclick="window.print()">IMPRIMIR</button>
        <button class="btn-ui" style="background:var(--accent); color:#fff; border:none" onclick="exportPDF()">SALVAR PDF</button>
    </div>
</header>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sb-head" style="padding:15px; font-size:10px; font-weight:800; color:#9ca3af">REPERTÓRIO</div>
        <div id="songList" class="sb-list"></div>
        <button class="btn-new" onclick="newSong()">+ ADICIONAR MÚSICA</button>
    </div>

    <div class="workspace">
        <div class="editor-panel">
            <div class="tabs">
                <button class="tab active" onclick="setTab('raw', this)">01. CIFRA BRUTA</button>
                <button class="tab" onclick="setTab('map', this)">02. MAPA DE TEXTO</button>
            </div>
            <div id="t-raw" class="tab-content active">
                <div class="meta-grid">
                    <input type="text" id="m-title" placeholder="Título" oninput="updateSong()">
                    <input type="text" id="m-artist" placeholder="Artista" oninput="updateSong()">
                    <input type="text" id="m-key" placeholder="Tom" oninput="updateSong()">
                </div>
                <textarea id="raw-in" oninput="processRaw()" placeholder="Cole a cifra do Cifra Club aqui..."></textarea>
            </div>
            <div id="t-map" class="tab-content">
                <textarea id="map-in" oninput="updateSong(); render();" placeholder="Edite o roadmap aqui..."></textarea>
            </div>
        </div>

        <div class="preview-area">
            <div id="paper" class="paper"></div>
        </div>
    </div>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('roadmap_v15')) || [];
    let activeId = null;
    const W = 600, H = 60, bW = W/4;

    function toggleSB() { document.getElementById('sidebar').classList.toggle('hidden'); }
    function setTab(t, el) {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('t-' + t).classList.add('active');
    }

    function processRaw() {
        const raw = document.getElementById('raw-in').value;
        const lines = raw.split('\n');
        let res = [];
        lines.forEach(l => {
            let t = l.trim();
            if (!t) return;
            let s = t.match(/\[(.*?)\]/);
            if (s) { res.push(`: ${s[1]}`); return; }
            const c = t.match(/\b([A-G][b#]?(maj7|m7b5|ø7|m7|7|Δ7|dim7|m|sus4|add9|9|C9|4|D4)?)\b/g);
            if (c) res.push(c.join('  '));
        });
        document.getElementById('map-in').value = res.join('\n');
        updateSong(); render();
    }

    /* O NOVO MOTOR: DESENHO PURO, ZERO TABELA */
    function drawSystem(line, isRep) {
        let svg = `<svg viewBox="0 -10 ${W} ${H+15}" xmlns="http://www.w3.org/2000/svg" style="display:block; width:100%; overflow:visible;">`;
        
        // PAUTA: Apenas duas linhas horizontais (estilo aberto)
        svg += `<line x1="0" y1="0" x2="${W}" y2="0" stroke="black" stroke-width="1.2"/>`;
        svg += `<line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="black" stroke-width="1.2"/>`;
        
        // BARLINES: Apenas cortes verticais (sem fechar laterais como caixas)
        for(let i=0; i<=4; i++) {
            let sw = (i === 0 || i === 4) ? 2.5 : 0.8;
            svg += `<line x1="${i*bW}" y1="0" x2="${i*bW}" y2="${H}" stroke="black" stroke-width="${sw}"/>`;
        }

        // RITORNELLO: Geometria pura estilo ChordSheet
        if(isRep) {
            svg += `<rect x="0" y="0" width="5" height="${H}" fill="black"/>`;
            svg += `<circle cx="14" cy="${H/2-8}" r="2.8" fill="black"/><circle cx="14" cy="${H/2+8}" r="2.8" fill="black"/>`;
        }

        const chords = line.trim().split(/\s+/).slice(0, 4);
        chords.forEach((chord, i) => {
            const cx = i * bW + bW / 2;
            if (chord === '%' || !chord) {
                svg += `<line x1="${cx-10}" y1="${H/2+10}" x2="${cx+10}" y2="${H/2-10}" stroke="#999" stroke-width="1.8"/>`;
                svg += `<circle cx="${cx-7}" cy="${H/2-7}" r="2.2" fill="#999"/><circle cx="${cx+7}" cy="${H/2+7}" r="2.2" fill="#999"/>`;
            } else {
                let m = chord.match(/^([A-G][b#]?)(.*)$/);
                if(m) {
                    let q = m[2].replace(/maj7/gi,'Δ7').replace(/m7b5/gi,'ø7');
                    svg += `<text x="${cx}" y="${H/2+5}" font-family="Patrick Hand" font-size="34" text-anchor="middle" fill="black">${m[1]}<tspan dy="-12" font-size="18">${q}</tspan></text>`;
                }
            }
        });
        return svg + `</svg>`;
    }

    function render() {
        const out = document.getElementById('paper');
        const t = document.getElementById('m-title').value || 'SEM TÍTULO';
        const a = document.getElementById('m-artist').value || 'Artista';
        const k = document.getElementById('m-key').value || '';
        const map = document.getElementById('map-in').value;

        let h = `<div class="p-title">${t}</div><div class="p-artist">${a} ${k ? ' • Tom: '+k : ''}</div>`;
        
        const lines = map.split('\n').map(l => l.trim()).filter(l => l !== "");
        lines.forEach((line, idx) => {
            if (line.startsWith(':')) {
                h += `<div class="p-section">${line.replace(':', '').trim()}</div>`;
            } else {
                const isRep = line.includes('(') || line.includes('x');
                const cleanLine = line.replace(/[()]/g,'').replace(/ x\d+/,'');
                h += `<div class="p-system">${drawSystem(cleanLine, isRep)}</div>`;
            }
        });
        out.innerHTML = h;
    }

    function newSong() {
        let s = { id: Date.now(), title: 'Nova Música', artist: '', key: '', raw: '', map: '' };
        songs.unshift(s); loadSong(s.id);
    }

    function loadSong(id) {
        activeId = id; const s = songs.find(x => x.id === id);
        document.getElementById('m-title').value = s.title;
        document.getElementById('m-artist').value = s.artist;
        document.getElementById('m-key').value = s.key;
        document.getElementById('raw-in').value = s.raw;
        document.getElementById('map-in').value = s.map;
        renderList(); render();
    }

    function updateSong() {
        if (!activeId) return;
        const s = songs.find(x => x.id === activeId);
        s.title = document.getElementById('m-title').value;
        s.artist = document.getElementById('m-artist').value;
        s.key = document.getElementById('m-key').value;
        s.raw = document.getElementById('raw-in').value;
        s.map = document.getElementById('map-in').value;
        localStorage.setItem('roadmap_v15', JSON.stringify(songs));
        renderList();
    }

    function renderList() {
        document.getElementById('songList').innerHTML = songs.map(s => `
            <div class="sb-item ${s.id===activeId?'active':''}" onclick="loadSong(${s.id})">
                ${s.title || 'Música'}
            </div>`).join('');
    }

    function exportPDF() {
        const opt = { margin: 0, filename: 'roadmap.pdf', html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(document.getElementById('paper')).save();
    }

    if(songs.length > 0) loadSong(songs[0].id); else newSong();
</script>
</body>
</html>
