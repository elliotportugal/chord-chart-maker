<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Maker PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Libre+Baskerville:wght@700&family=IBM+Plex+Mono:wght@400;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg:#0f0e0d; --surf:#181714; --bd:#2e2c28; --tx:#e6e2d6; --mu:#746e62; --gold:#c8a84b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--tx); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* UI Structure */
        header { background: var(--surf); height: 50px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--bd); justify-content: space-between; flex-shrink: 0; }
        .app { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 220px; background: var(--surf); border-right: 1px solid var(--bd); display: flex; flex-direction: column; flex-shrink: 0; }
        .main { flex: 1; display: grid; grid-template-columns: 1fr 1.3fr; overflow: hidden; }
        .panel { display: flex; flex-direction: column; border-right: 1px solid var(--bd); overflow: hidden; }
        .panel-head { padding: 8px 14px; background: var(--surf); border-bottom: 1px solid var(--bd); font-size: 10px; font-weight: 900; color: var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .meta-row { display: grid; grid-template-columns: 1fr 1fr 64px; gap: 8px; padding: 10px; border-bottom: 1px solid var(--bd); }
        input { background: #111; border: 1px solid #3e3c38; color: #fff; padding: 6px; border-radius: 4px; font-size: 12px; outline: none; }
        textarea { flex: 1; background: #0c0c0b; color: #d8d4c8; border: none; padding: 15px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.8; outline: none; resize: none; }

        /* Roadmap Preview - ChordSheet Style */
        .grid-body { flex: 1; overflow-y: auto; padding: 40px; background: #19171a; display: flex; flex-direction: column; align-items: center; }
        .rb { 
            background: #fff; 
            padding: 1.5cm 2cm; 
            width: 210mm; 
            min-height: 297mm; 
            color: #000; 
            font-family: 'Patrick Hand', cursive; 
            position: relative; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
        }

        .rb-title { font-size: 32px; line-height: 1; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .rb-sub { font-size: 18px; color: #333; margin-bottom: 10px; }
        .rb-hr { border: none; border-top: 2.5px solid #000; margin-bottom: 30px; }
        .rb-sec-group { margin-top: 25px; margin-bottom: 10px; }
        .rb-sec-label { font-size: 20px; font-weight: 400; margin-bottom: 8px; color: #000; }
        .rb-system-wrap { margin-top: -1.5px; break-inside: avoid; }

        /* Page Break Guide (Visual only in editor) */
        .page-break-guide { border-top: 2px dashed #ff4444; margin-top: 297mm; position: absolute; width: 100%; left: 0; pointer-events: none; }

        @media print {
            body, html { height: auto !important; overflow: visible !important; }
            header, .sidebar, .panel, .page-break-guide { display: none !important; }
            .app, .main, .grid-body { display: block !important; overflow: visible !important; background: white !important; padding: 0 !important; }
            .rb { box-shadow: none !important; width: 100% !important; padding: 1.5cm !important; border: none !important; }
        }
    </style>
</head>
<body>

<header>
    <div style="font-family:'Libre Baskerville'; font-weight:700; color:var(--gold)">ROADMAP MAKER PRO</div>
    <div style="display:flex; gap:10px">
        <button style="background:#2e2c28; color:white; border:none; padding:8px 16px; font-weight:900; cursor:pointer; border-radius:4px;" onclick="exportPDF()">EXPORTAR PDF</button>
        <button style="background:var(--gold); border:none; padding:8px 16px; font-weight:900; cursor:pointer; border-radius:4px;" onclick="window.print()">IMPRIMIR</button>
    </div>
</header>

<div class="app">
    <div class="sidebar">
        <div style="padding:12px; font-size:10px; color:var(--mu); font-weight:900; border-bottom:1px solid var(--bd)">REPERTÓRIO</div>
        <div id="songList" style="flex:1; overflow-y:auto; padding:5px"></div>
        <button style="background:var(--gold); margin:10px; padding:10px; border:none; font-weight:900; cursor:pointer; border-radius:4px;" onclick="createNewSong()">+ NOVA MÚSICA</button>
    </div>

    <div class="main">
        <div class="panel">
            <div class="panel-head">01: CIFRA BRUTA</div>
            <div class="meta-row">
                <input type="text" id="iTitle" placeholder="Título" oninput="save()">
                <input type="text" id="iArtist" placeholder="Artista" oninput="save()">
                <input type="text" id="iKey" placeholder="Tom" oninput="save()">
            </div>
            <textarea id="cifraBruta" placeholder="Cole a cifra aqui..." oninput="autoClean()"></textarea>
        </div>

        <div class="panel">
            <div class="panel-head">02: MAPA DE TEXTO & GRADE</div>
            <textarea id="csEdit" style="flex: 0 0 250px; background:#111; border-bottom: 2px solid var(--bd);" oninput="save(); update();"></textarea>
            <div class="grid-body">
                <div id="out" class="rb"></div>
            </div>
        </div>
    </div>
</div>

<script>
let songs = JSON.parse(localStorage.getItem('roadmap_v12_final') || '[]');
let currentId = null;
const W = 600, H = 60, barW = W/4;

function exportPDF() {
    const element = document.getElementById('out');
    const opt = {
        margin: 0,
        filename: `${document.getElementById('iTitle').value || 'roadmap'}.pdf`,
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
}

function autoClean() {
    const raw = document.getElementById('cifraBruta').value;
    const lines = raw.split('\n');
    let map = [];
    lines.forEach(l => {
        let t = l.trim();
        if (!t) return;
        let sec = t.match(/\[(.*?)\]/);
        if (sec) { map.push(`: ${sec[1]}`); return; }
        const chords = t.match(/\b([A-G][b#]?(maj7|m7b5|ø7|m7|7|Δ7|dim7|m|sus4|add9|9|C9|4|D4)?)\b/g);
        if (chords) map.push(chords.join('  '));
    });
    document.getElementById('csEdit').value = map.join('\n');
    save(); update();
}

function renderSVG(line, isRep) {
    let svg = `<svg viewBox="0 -10 ${W} ${H+15}" xmlns="http://www.w3.org/2000/svg" style="display:block; width:100%; overflow:visible;">`;
    const midY = H/2;
    
    // Pauta Horizontal (Fina e Contínua)
    svg += `<line x1="0" y1="0" x2="${W}" y2="0" stroke="black" stroke-width="1.2"/>`;
    svg += `<line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="black" stroke-width="1.2"/>`;
    
    // Barlines (Externa 2px, Interna 0.8px)
    for(let i=0; i<=4; i++) {
        let sw = (i === 0 || i === 4) ? 2 : 0.8;
        svg += `<line x1="${i*barW}" y1="0" x2="${i*barW}" y2="${H}" stroke="black" stroke-width="${sw}"/>`;
    }

    // Ritornello
    if(isRep) {
        svg += `<rect x="0" y="0" width="4" height="${H}" fill="black"/>`;
        svg += `<circle cx="12" cy="${midY-8}" r="2.5" fill="black"/><circle cx="12" cy="${midY+8}" r="2.5" fill="black"/>`;
    }

    const chords = line.trim().split(/\s+/).slice(0, 4);
    chords.forEach((chord, i) => {
        const cx = i * barW + barW / 2;
        if (chord === '%' || !chord) {
            svg += `<line x1="${cx-8}" y1="${midY+8}" x2="${cx+8}" y2="${midY-8}" stroke="#999" stroke-width="1.5"/>`;
            svg += `<circle cx="${cx-5}" cy="${midY-5}" r="1.8" fill="#999"/><circle cx="${cx+5}" cy="${midY+5}" r="1.8" fill="#999"/>`;
        } else {
            let m = chord.match(/^([A-G][b#]?)(.*)$/);
            if(m) {
                let q = m[2].replace(/maj7/gi,'Δ7').replace(/m7b5/gi,'ø7');
                svg += `<text x="${cx}" y="${midY+5}" font-family="Patrick Hand" font-size="32" text-anchor="middle" dominant-baseline="central">${m[1]}<tspan dy="-12" font-size="18">${q}</tspan></text>`;
            }
        }
    });
    return svg + `</svg>`;
}

function update() {
    const out = document.getElementById('out');
    const title = document.getElementById('iTitle').value || 'SEM TÍTULO';
    const artist = document.getElementById('iArtist').value || 'ARTISTA';
    const key = document.getElementById('iKey').value || '';
    const text = document.getElementById('csEdit').value;

    let html = `<div class="rb-title">${title}</div><div class="rb-sub">${artist} ${key ? '| Tom: '+key : ''}</div><hr class="rb-hr">`;

    const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
    let grid = "";

    lines.forEach((line, idx) => {
        if (line.startsWith(':')) {
            grid += `<div class="rb-sec-group"><div class="rb-sec-label">${line.replace(':', '').trim()}</div>`;
        } else {
            const isRep = line.includes('(') || line.includes('x');
            const cleanLine = line.replace(/[()]/g,'').replace(/ x\d+/,'');
            grid += `<div class="rb-system-wrap">${renderSVG(cleanLine, isRep)}</div>`;
            if (lines[idx+1] && lines[idx+1].startsWith(':')) grid += `</div>`;
        }
    });
    
    grid += `<div class="page-break-guide"></div>`;
    out.innerHTML = html + grid + `</div>`;
}

function createNewSong() {
    let s = { id: Date.now(), title: '', artist: '', key: '', raw: '', clean: '' };
    songs.push(s); loadSong(s.id);
}

function loadSong(id) {
    currentId = id; const s = songs.find(x => x.id === id);
    if (!s) return;
    document.getElementById('iTitle').value = s.title || '';
    document.getElementById('iArtist').value = s.artist || '';
    document.getElementById('iKey').value = s.key || '';
    document.getElementById('cifraBruta').value = s.raw || '';
    document.getElementById('csEdit').value = s.clean || '';
    renderSongs(); update();
}

function save() {
    if (!currentId) return; const s = songs.find(x => x.id === currentId);
    s.title = document.getElementById('iTitle').value;
    s.artist = document.getElementById('iArtist').value;
    s.key = document.getElementById('iKey').value;
    s.raw = document.getElementById('cifraBruta').value;
    s.clean = document.getElementById('csEdit').value;
    localStorage.setItem('roadmap_v12_final', JSON.stringify(songs));
    renderSongs();
}

function renderSongs() {
    document.getElementById('songList').innerHTML = songs.map(s => `<div class="song-item" onclick="loadSong(${s.id})" style="padding:10px; cursor:pointer; font-size:12px; border-bottom:1px solid #2e2c28">${s.title || 'Nova Música'}</div>`).join('');
}

if(songs.length > 0) loadSong(songs[0].id); else createNewSong();
</script>
</body>
</html>
