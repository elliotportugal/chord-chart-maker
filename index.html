<style>
:root {
  --bg:#0f0e0d; --surf:#181714; --bd:#2e2c28; --bd2:#3e3c38;
  --tx:#e6e2d6; --mu:#746e62; --gold:#c8a84b;
  --ink:#000; --ink2:#333; --ink3:#666;
  --bar:#aaa;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;}

/* ── HEADER ── */
header{background:var(–surf);height:50px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(–bd);gap:12px;flex-shrink:0;}
.logo{font-family:‘Libre Baskerville’,serif;color:var(–gold);font-weight:700;font-size:15px;}

/* ── APP ── */
.app{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:var(–surf);border-right:1px solid var(–bd);display:flex;flex-direction:column;flex-shrink:0;}
.sb-label{padding:10px 14px;font-size:9px;font-weight:900;color:var(–mu);letter-spacing:.15em;border-bottom:1px solid var(–bd);}
.song-list{flex:1;overflow-y:auto;padding:4px;}
.song-list::-webkit-scrollbar{width:3px;}
.song-list::-webkit-scrollbar-thumb{background:var(–bd2);}
.song-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:3px;font-size:11px;cursor:pointer;margin-bottom:1px;border:1px solid transparent;}
.song-item:hover{background:var(–bg);}
.song-item.active{background:#1c1a17;color:var(–gold);border-color:var(–gold);}
.del-btn{color:#a04848;padding:1px 5px;font-size:13px;}
.sb-new{margin:8px;background:var(–gold);border:none;padding:9px;font-weight:900;font-size:11px;cursor:pointer;border-radius:3px;width:calc(100% - 16px);}

/* ── MAIN ── */
.main{flex:1;display:grid;grid-template-columns:1fr 1.3fr;overflow:hidden;min-height:0;}
.panel{display:flex;flex-direction:column;border-right:1px solid var(–bd);overflow:hidden;}
.panel-head{padding:8px 14px;background:var(–surf);border-bottom:1px solid var(–bd);font-size:9px;font-weight:900;color:var(–gold);letter-spacing:.12em;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.meta-row{display:grid;grid-template-columns:1fr 1fr 60px;gap:7px;padding:10px 12px;border-bottom:1px solid var(–bd);flex-shrink:0;}
input{background:#111;border:1px solid var(–bd2);color:#fff;padding:6px 8px;border-radius:3px;font-size:12px;outline:none;font-family:‘Lato’,sans-serif;}
input::placeholder{color:#444;}
input:focus{border-color:var(–gold);}
textarea{flex:1;background:#0c0c0b;color:#d8d4c8;border:none;padding:14px;font-family:‘IBM Plex Mono’,monospace;font-size:12px;line-height:1.85;outline:none;resize:none;}
.tab-bar{display:flex;background:var(–surf);border-bottom:1px solid var(–bd);flex-shrink:0;}
.tab{flex:1;padding:10px 0;background:none;border:none;border-bottom:2px solid transparent;color:var(–mu);font-size:9px;font-weight:900;letter-spacing:.1em;cursor:pointer;font-family:‘Lato’,sans-serif;}
.tab.active{color:var(–gold);border-bottom-color:var(–gold);}

/* ── GRID PREVIEW ── */
.grid-body{flex:1;overflow-y:auto;padding:32px 24px;background:#19171a;}
.grid-body::-webkit-scrollbar{width:4px;}
.grid-body::-webkit-scrollbar-thumb{background:var(–bd2);}

/* ════════════════════════════════════════════
CHORD SHEET — ChordSheet.com faithful style
Font: Patrick Hand (handwritten jazz feel)
Colors: pure white background, black ink
Bars: left-border only (no top/bottom lines)
════════════════════════════════════════════ */
.rb {
background: #fff;
padding: 48px 44px 56px;
width: 100%;
max-width: 720px;
margin: 0 auto;
color: #000;
box-shadow: 0 8px 40px rgba(0,0,0,.6);
font-family: ‘Patrick Hand’, cursive;
}

/* Title block */
.rb-title {
font-family: ‘Patrick Hand’, cursive;
font-size: 30px;
font-weight: 400;
color: #000;
line-height: 1.1;
letter-spacing: .01em;
}
.rb-sub {
font-family: ‘Patrick Hand’, cursive;
font-size: 14px;
color: #555;
margin-top: 2px;
}
.rb-hr {
border: none;
border-top: 2px solid #000;
margin: 10px 0 3px;
}
.rb-hr2 {
border: none;
border-top: 1px solid #000;
margin: 0 0 26px;
}

/* Section group */
.rb-sec { margin-bottom: 18px; }

/* Section label — bordered box like ChordSheet.com */
.rb-sec-label {
display: inline-block;
border: 1px solid #555;
font-family: ‘Patrick Hand’, cursive;
font-size: 12px;
color: #444;
padding: 1px 8px 2px;
margin-bottom: 4px;
line-height: 1.5;
letter-spacing: .02em;
}

/* Bar row — no top/bottom borders, just structure */
.rb-row {
display: flex;
align-items: stretch;
margin-bottom: 2px;
position: relative;
}

/* Closing barline via pseudo after row */
.rb-row::after {
content: ‘’;
width: 1.5px;
background: #888;
flex-shrink: 0;
align-self: stretch;
}

/* Each bar — left border IS the barline */
.rb-bar {
flex: 1;
min-height: 70px;
border-left: 1.5px solid #888;
display: flex;
align-items: center;
justify-content: center;
position: relative;
padding: 10px 6px 6px;
}

/* Ritornello start bar (thick-thin-dots) */
.rb-bar.rep-start {
border-left: none;
padding-left: 20px;
}
.rb-bar.rep-start::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 5px;
background: #000;
box-shadow: 7px 0 0 0 #fff, 8px 0 0 0 #888;
}

/* Ritornello end — injected via JS as absolute positioned element */
.rit-end-wrap {
position: absolute;
right: -11px;
top: 0; bottom: 0;
display: flex;
align-items: stretch;
z-index: 3;
pointer-events: none;
}
.rit-end-thin { width: 1px; background: #888; }
.rit-end-gap  { width: 2px; background: transparent; }
.rit-end-thick{ width: 5px; background: #000; }

/* Ritornello dots */
.rit-dots {
position: absolute;
display: flex;
flex-direction: column;
gap: 6px;
z-index: 4;
}
.rit-dots.rit-left  { left: 16px; top: 50%; transform: translateY(-50%); }
.rit-dots.rit-right { right: 16px; top: 50%; transform: translateY(-50%); }
.rit-dot { width: 5px; height: 5px; border-radius: 50%; background: #000; }

/* Repeat count — top-right of row */
.rb-rep-count {
position: absolute;
top: 3px; right: 8px;
font-family: ‘Patrick Hand’, cursive;
font-size: 13px;
color: #444;
line-height: 1;
z-index: 5;
}

/* Chord text */
.rb-chord {
display: flex;
align-items: baseline;
justify-content: center;
gap: 0;
line-height: 1;
padding-top: 4px;
}
.rb-chord-root {
font-family: ‘Patrick Hand’, cursive;
font-size: 32px;
font-weight: 400;
color: #000;
letter-spacing: -.01em;
line-height: 1;
}
.rb-chord-qual {
font-family: ‘Patrick Hand’, cursive;
font-size: 15px;
color: #222;
vertical-align: super;
line-height: 1;
letter-spacing: 0;
}

/* Measure repeat symbol */
.rb-slash-wrap {
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
padding-top: 4px;
}
.rb-slash-char {
font-family: ‘Patrick Hand’, cursive;
font-size: 28px;
color: #bbb;
line-height: .9;
transform: rotate(-5deg);
}
.rb-slash-dots {
display: flex;
gap: 12px;
margin-top: -2px;
}
.rb-slash-dot {
width: 5px; height: 5px;
border-radius: 50%;
background: #bbb;
}

/* ════════════════════════════════════════════
PRINT — proper multi-page PDF
Key fixes:

1. All panels hidden except .rb
1. .rb gets page-break rules
1. Each .rb-sec-group avoids mid-break
1. White background forced everywhere
   ════════════════════════════════════════════ */
   @media print {

.rb-rep-count { color: #333 !important; }
.rb-sec-label { color: #333 !important; border-color: #333 !important; }
}
</style>

<script>
/* ── STATE ── */
let songs = JSON.parse(localStorage.getItem('roadmap_v6') || '[]');
let currentId = null;

/* ── UTILS ── */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── NORMALIZE CHORD ── */
function norm(raw) {
  let c = String(raw).trim();
  if (!c || c === '%') return c || null;
  c = c.replace(/\([^)]*\)/g, '');
  c = c.replace(/[Mm]aj7/gi, 'Δ7').replace(/7M$/, 'Δ7').replace(/M7$/, 'Δ7');
  c = c.replace(/[Mm]7b5/gi, 'ø7');
  c = c.replace(/([A-G][b#]?)mi\b/g, '$1m');
  c = c.replace(/([A-G][b#]?)-(?=[^0-9\/]|$)/g, '$1m');
  c = c.replace(/^([a-g])([b#]?)(.*)$/, (_, r, a, rest) => r.toUpperCase() + a + (rest || 'm'));
  c = c.replace(/[♭]/g, 'b').replace(/[♯]/g, '#');
  return c.trim() || null;
}

/* ── CHORD LINE DETECTION ── */
const CTR = /^[A-Ga-g][b#]?(?:m(?:aj)?|maj|sus|dim|aug|add)?[0-9]?(?:maj|sus|dim|aug|add)?[0-9]?(?:[b#][0-9])?(?:\/[A-G][b#]?)?$/;
function isCT(w) { const c = w.replace(/[(),]/g,'').trim(); return c.length > 0 && c.length <= 10 && CTR.test(c); }
function isCL(line) {
  const t = line.trim();
  if (!t) return false;
  if (/\[[A-G][^\]]{0,9}\]/.test(t)) return true;
  const toks = t.split(/\s+/).filter(Boolean);
  if (!toks.length || !toks.some(x => /^[A-Ga-g]/.test(x))) return false;
  return toks.every(isCT);
}
const SERE = /^(intro|verso|vers[ao]|refrão|refrao|chorus|ponte|bridge|solo|outro|coda|pre.?refr|pre.?chorus|segunda|primeira|terceira|parte|variacao|variação|corpo|estrutura|passagem|final|tag|breakdown|instrumental)[\s:]*$/i;

/* ── AUTO CLEAN: raw cifra → CS text ── */
function autoClean() {
  const raw = document.getElementById('cifraBruta').value;
  const lines = raw.split('\n');
  const out = [];
  let titleSet = false;

  for (const rawLine of lines) {
    const t = rawLine.trim();
    if (!t) continue;
    if (/^\{.+\}$/.test(t)) continue;

    // Detect title/artist on first non-chord, non-directive line
    if (!titleSet && !t.startsWith('[') && !isCL(t) && !SERE.test(t.replace(/:$/,''))) {
      if (t.includes(' - ')) {
        const p = t.split(' - ');
        if (!document.getElementById('iArtist').value) document.getElementById('iArtist').value = p[0].trim();
        if (!document.getElementById('iTitle').value)  document.getElementById('iTitle').value  = p.slice(1).join(' - ').trim();
      } else if (!document.getElementById('iTitle').value) {
        document.getElementById('iTitle').value = t;
      }
      titleSet = true;
      continue;
    }

    // Section bracket [Name]
    const bm = t.match(/^\[([^\]]+)\]$/);
    if (bm) {
      const inn = bm[1].trim();
      if (/^[A-G][b#]?/.test(inn) && inn.length <= 10 && !inn.includes(' ')) { /* chord line */ }
      else { out.push(': ' + inn); continue; }
    }

    // Section keyword
    if (SERE.test(t.replace(/:$/, ''))) { out.push(': ' + t.replace(/:$/, '').trim()); continue; }

    // Inline [chord]
    if (t.includes('[')) {
      const chords = []; const re = /\[([^\]]+)\]/g; let m;
      while ((m = re.exec(t)) !== null) { const n = norm(m[1].trim()); if (n) chords.push(n); }
      if (chords.length) out.push(chords.join(' '));
      continue;
    }

    // Free-form chord line
    if (isCL(t)) {
      const chords = t.split(/\s+/).filter(Boolean).map(tok => norm(tok.replace(/[(),]/g,''))).filter(Boolean);
      if (chords.length) out.push(chords.join(' '));
    }
  }

  document.getElementById('csEdit').value = out.join('\n');
  saveCurrent();
  updateGrid();
}

/* ── PARSE CS TEXT → MODEL ── */
function parseCS(text) {
  const lines = text.split('\n');
  const secs = []; let curN = null, curT = [];

  function flush() { if (curN !== null || curT.length > 0) secs.push({ name: curN, tokens: [...curT], rep: 0 }); }

  for (const raw of lines) {
    const t = raw.trim();
    if (!t) continue;
    if (t[0] === ':' || t[0] === '=') { flush(); curN = t.slice(1).trim(); curT = []; continue; }
    const rm = t.match(/^\((.+?)\)\s*x(\d+)$/i);
    if (rm) { flush(); secs.push({ name: curN, tokens: parseTL(rm[1]), rep: parseInt(rm[2]) }); curN = null; curT = []; continue; }
    parseTL(t).forEach(tok => curT.push(tok));
  }
  flush();

  return secs.map(sec => {
    const rows = [];
    for (let i = 0; i < sec.tokens.length; i += 4) {
      const row = sec.tokens.slice(i, i + 4);
      while (row.length < 4) row.push(null);
      rows.push(row);
    }
    return { name: sec.name, rows, rep: sec.rep || 0 };
  });
}

function parseTL(line) {
  const toks = [];
  line.split(/\s+/).filter(Boolean).forEach(p => {
    if (p === '%') { toks.push('%'); return; }
    if (p.includes('_')) { const h = p.split('_'); toks.push(norm(h[0])||h[0]); toks.push(norm(h[1])||h[1]); return; }
    const n = norm(p); if (n) toks.push(n);
  });
  return toks;
}

/* ── RENDER CHORD ── */
function renderChord(chord) {
  if (!chord || chord === '%') {
    return `<div class="rb-slash-wrap">
      <div class="rb-slash-dots"><div class="rb-slash-dot"></div></div>
      <div class="rb-slash-char">&#x2215;</div>
      <div class="rb-slash-dots"><div class="rb-slash-dot"></div></div>
    </div>`;
  }
  const m = chord.match(/^([A-G][b#]?)(.*)$/);
  if (!m) return `<div class="rb-chord"><span class="rb-chord-root">${esc(chord)}</span></div>`;
  const root = m[1], qual = m[2] || '';
  return `<div class="rb-chord">
    <span class="rb-chord-root">${esc(root)}</span>${qual ? `<span class="rb-chord-qual">${esc(qual)}</span>` : ''}
  </div>`;
}

/* ── RENDER ROW ── */
function renderRow(row, isFirst, isLast, isRep, repCount) {
  let html = `<div class="rb-row">`;

  row.forEach((chord, ci) => {
    const isRepStart = isRep && isFirst && ci === 0;
    const isRepEnd   = isRep && isLast  && ci === 3;

    let barClass = 'rb-bar';
    if (isRepStart) barClass += ' rep-start';

    html += `<div class="${barClass}">`;

    // Ritornello start dots
    if (isRepStart) {
      html += `<div class="rit-dots rit-left"><div class="rit-dot"></div><div class="rit-dot"></div></div>`;
    }

    html += renderChord(chord);

    // Ritornello end: thin+gap+thick + dots
    if (isRepEnd) {
      html += `<div class="rit-end-wrap"><div class="rit-end-thin"></div><div class="rit-end-gap"></div><div class="rit-end-thick"></div></div>`;
      html += `<div class="rit-dots rit-right"><div class="rit-dot"></div><div class="rit-dot"></div></div>`;
    }

    html += `</div>`; // bar
  });

  // Repeat count top-right on last row
  if (isRep && isLast) {
    html += `<div class="rb-rep-count">x${repCount}</div>`;
  }

  html += `</div>`; // row
  return html;
}

/* ── UPDATE GRID ── */
function updateGrid() {
  const title  = document.getElementById('iTitle').value  || 'Sem Título';
  const artist = document.getElementById('iArtist').value || '';
  const key    = document.getElementById('iKey').value    || '';
  const text   = document.getElementById('csEdit').value;
  const out    = document.getElementById('out');

  let html = `<div class="rb-title">${esc(title)}</div>`;
  const subParts = [artist, key ? 'Tom: ' + key : ''].filter(Boolean);
  if (subParts.length) html += `<div class="rb-sub">${esc(subParts.join(' | '))}</div>`;
  html += `<hr class="rb-hr"><hr class="rb-hr2">`;

  if (!text.trim()) {
    html += `<div style="opacity:.3;font-family:'Patrick Hand',cursive;font-size:17px;text-align:center;padding:40px 0;color:#000;">Edite o texto no passo 2</div>`;
    out.innerHTML = html; return;
  }

  const sections = parseCS(text);
  sections.forEach(sec => {
    html += `<div class="rb-sec">`;
    if (sec.name) html += `<div class="rb-sec-label">${esc(sec.name)}</div>`;
    const isRep = sec.rep > 1;
    sec.rows.forEach((row, ri) => {
      html += renderRow(row, ri === 0, ri === sec.rows.length - 1, isRep, sec.rep);
    });
    html += `</div>`;
  });

  out.innerHTML = html;
}

/* ── TABS ── */
function switchTab(t) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.getElementById('view-cs').style.display   = t === 'cs'   ? 'flex'  : 'none';
  document.getElementById('view-grid').style.display = t === 'grid' ? 'flex'  : 'none';
  if (t === 'grid') updateGrid();
}

function applyAndSwitch() {
  saveCurrent();
  updateGrid();
  switchTab('grid');
}

/* ── PRINT ── */
function printPDF() {
  // Force grid tab visible before printing so the browser sees the content
  const wasGrid = document.getElementById('view-grid').style.display === 'flex';
  document.getElementById('view-cs').style.display   = 'none';
  document.getElementById('view-grid').style.display = 'block';
  updateGrid();
  setTimeout(() => {
    window.print();
    // Restore state after print dialog
    setTimeout(() => {
      if (!wasGrid) {
        document.getElementById('view-cs').style.display   = 'flex';
        document.getElementById('view-grid').style.display = 'none';
      }
    }, 500);
  }, 150);
}

/* ── STORAGE ── */
function createNewSong() {
  const s = { id: Date.now(), title: '', artist: '', key: '', raw: '', clean: '' };
  songs.push(s); loadSong(s.id);
}

function loadSong(id) {
  currentId = id;
  const s = songs.find(x => x.id === id);
  document.getElementById('iTitle').value    = s.title  || '';
  document.getElementById('iArtist').value   = s.artist || '';
  document.getElementById('iKey').value      = s.key    || '';
  document.getElementById('cifraBruta').value = s.raw   || '';
  document.getElementById('csEdit').value    = s.clean  || '';
  renderList(); updateGrid();
}

function saveCurrent() {
  if (!currentId) return;
  const s = songs.find(x => x.id === currentId);
  if (!s) return;
  s.title  = document.getElementById('iTitle').value;
  s.artist = document.getElementById('iArtist').value;
  s.key    = document.getElementById('iKey').value;
  s.raw    = document.getElementById('cifraBruta').value;
  s.clean  = document.getElementById('csEdit').value;
  localStorage.setItem('roadmap_v6', JSON.stringify(songs));
  renderList();
}

function deleteSong(id, e) {
  e.stopPropagation();
  if (!confirm('Remover música?')) return;
  songs = songs.filter(x => x.id !== id);
  localStorage.setItem('roadmap_v6', JSON.stringify(songs));
  songs.length > 0 ? loadSong(songs[0].id) : createNewSong();
}

function renderList() {
  document.getElementById('songList').innerHTML = songs.map(s => `
    <div class="song-item ${s.id === currentId ? 'active' : ''}" onclick="loadSong(${s.id})">
      <span>${esc(s.title || 'Nova Música')}</span>
      <span class="del-btn" onclick="deleteSong(${s.id}, event)">✕</span>
    </div>`).join('');
}

/* INIT */
songs.length > 0 ? loadSong(songs[0].id) : createNewSong();
</script>

</body>
</html>
