<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Maker PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=IBM+Plex+Mono:wght@400;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0e0d; --surf: #181714; --bd: #2e2c28;
            --tx: #e6e2d6; --mu: #746e62; --gold: #c8a84b; --paper: #f5f0e4; --ink: #161310;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--tx); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--surf); height: 50px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--bd); gap: 15px; flex-shrink: 0; }
        .app { display: flex; flex: 1; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 220px; background: var(--surf); border-right: 1px solid var(--bd); display: flex; flex-direction: column; }
        .song-list { flex: 1; overflow-y: auto; padding: 5px; }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-bottom: 2px; }
        .song-item.active { background: #211f1c; color: var(--gold); border: 1px solid var(--gold); }
        .del-btn { color: #a04848; font-weight: bold; padding: 2px 5px; }

        /* PANELS */
        .main { flex: 1; display: grid; grid-template-columns: 1fr 1.2fr; overflow: hidden; }
        .panel { display: flex; flex-direction: column; border-right: 1px solid var(--bd); overflow: hidden; }
        .panel-head { padding: 8px 15px; background: var(--surf); border-bottom: 1px solid var(--bd); font-size: 10px; font-weight: 900; color: var(--gold); display: flex; justify-content: space-between; align-items: center; }
        
        .meta-row { display: grid; grid-template-columns: 1fr 1fr 60px; gap: 8px; padding: 10px; border-bottom: 1px solid var(--bd); }
        input { background: #111; border: 1px solid var(--bd); color: #fff; padding: 6px; border-radius: 4px; font-size: 12px; outline: none; }
        
        .tab-bar { display: flex; background: var(--surf); border-bottom: 1px solid var(--bd); }
        .tab { flex: 1; padding: 10px; background: none; border: none; color: var(--mu); font-size: 10px; font-weight: 900; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
        
        textarea { flex: 1; background: #0c0c0b; color: #fff; border: none; padding: 15px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.8; outline: none; resize: none; }

        /* PREVIEW - REAL BOOK STYLE */
        .grid-body { flex: 1; overflow-y: auto; padding: 40px; background: #1a1917; }
        .rb { background: var(--paper); padding: 50px; width: 100%; max-width: 750px; margin: 0 auto; color: var(--ink); min-height: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .rb-title { font-family: 'Libre Baskerville', serif; font-size: 32px; font-weight: 700; border-bottom: 3px solid var(--ink); padding-bottom: 5px; margin-bottom: 25px; }
        .rb-system-wrap { margin-top: -1.5px; position: relative; }
        .rb-sec-group { margin-bottom: 40px; }

        @media print {
            header, .sidebar, .panel, .tab-bar { display: none !important; }
            .main { display: block; }
            .grid-body { background: white; padding: 0; overflow: visible; }
            .rb { box-shadow: none; max-width: 100%; padding: 30px; background: white; }
        }
    </style>
</head>
<body>

<header>
    <div style="font-family:'Libre Baskerville'; color:var(--gold); font-weight:700">ROADMAP MAKER PRO</div>
    <button style="background:var(--gold); border:none; padding:8px 15px; font-weight:900; cursor:pointer; margin-left:auto; border-radius:4px;" onclick="window.print()">IMPRIMIR PDF</button>
</header>

<div class="app">
    <div class="sidebar">
        <div style="padding:12px; font-size:10px; font-weight:900; color:var(--mu); border-bottom:1px solid var(--bd);">REPERTÓRIO</div>
        <div id="songList" class="song-list"></div>
        <button style="background:var(--gold); border:none; padding:10px; font-weight:900; cursor:pointer; margin:10px; border-radius:4px;" onclick="createNewSong()">+ NOVA MÚSICA</button>
    </div>

    <div class="main">
        <div class="panel">
            <div class="panel-head">01: CIFRA BRUTA (COLAR)</div>
            <div class="meta-row">
                <input type="text" id="iTitle" placeholder="Título" oninput="saveCurrent()">
                <input type="text" id="iArtist" placeholder="Artista" oninput="saveCurrent()">
                <input type="text" id="iKey" placeholder="Tom" oninput="saveCurrent()">
            </div>
            <textarea id="cifraBruta" oninput="autoClean()"></textarea>
        </div>

        <div class="panel">
            <div class="tab-bar">
                <button class="tab active" id="tab-cs" onclick="switchTab('cs')">02. MAPA DE TEXTO</button>
                <button class="tab" id="tab-grid" onclick="switchTab('grid')">03. GRADE REAL BOOK</button>
            </div>
            <div id="view-cs" style="display:flex; flex:1; flex-direction:column;">
                <div class="panel-head">
                    <span>EDITAR ROTEIRO</span>
                    <button style="background:var(--gold); border:none; padding:3px 8px; font-size:9px; font-weight:900; cursor:pointer; border-radius:3px;" onclick="updateGrid()">⚡ ATUALIZAR</button>
                </div>
                <textarea id="csEdit" oninput="saveCurrent(); updateGrid();"></textarea>
            </div>
            <div id="view-grid" style="display:none; flex:1;" class="grid-body">
                <div id="out" class="rb"></div>
            </div>
        </div>
    </div>
</div>

<script>
let songs = JSON.parse(localStorage.getItem('roadmap_v4') || '[]');
let currentId = null;
const W = 600, H = 65, barW = W/4;

function switchTab(t) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    document.getElementById('view-cs').style.display = t==='cs'?'flex':'none';
    document.getElementById('view-grid').style.display = t==='grid'?'flex':'none';
    if(t==='grid') updateGrid();
}

function autoClean() {
    const raw = document.getElementById('cifraBruta').value;
    const lines = raw.split('\n');
    let map = [];
    lines.forEach(line => {
        let t = line.trim();
        if (!t) return;
        let sec = t.match(/\[(.*?)\]/);
        if (sec) { map.push(`: ${sec[1]}`); return; }
        const chords = t.match(/\b([A-G][b#]?(maj7|m7b5|ø7|m7|7|Δ7|dim7|m|sus4|add9|9|C9|4|D4)?)\b/g);
        if (chords) map.push(chords.join('  '));
    });
    document.getElementById('csEdit').value = map.join('\n');
    saveCurrent();
    updateGrid();
}

function renderSVG(line, label, isFirstInSec) {
    let svg = `<svg viewBox="0 -25 ${W} ${H+25}" xmlns="http://www.w3.org/2000/svg" style="display:block; width:100%; overflow:visible;">`;
    const midY = H/2;
    
    // Pautas horizontais (Sem fechar a caixa lateral)
    svg += `<line x1="0" y1="0" x2="${W}" y2="0" stroke="black" stroke-width="2"/>`;
    svg += `<line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="black" stroke-width="2"/>`;
    
    // Barlines rítmicas
    for(let i=0; i<=4; i++) {
        let sw = (i===0 || i===4) ? 2.5 : 0.8;
        svg += `<line x1="${i*barW}" y1="0" x2="${i*barW}" y2="${H}" stroke="black" stroke-width="${sw}"/>`;
    }

    // Rehearsal Mark (Rótulo de Seção)
    if(label && isFirstInSec) {
        svg += `<rect x="0" y="-22" width="22" height="22" fill="white" stroke="black" stroke-width="1.5"/>`;
        svg += `<text x="11" y="-11" fill="black" font-family="serif" font-weight="700" font-size="10" text-anchor="middle" dominant-baseline="central">${label}</text>`;
    }

    const chords = line.trim().split(/\s+/).slice(0,4);
    chords.forEach((chord, i) => {
        const cx = i*barW + barW/2;
        if(chord === '%') {
            svg += `<line x1="${cx-12}" y1="${midY+10}" x2="${cx+12}" y2="${midY-10}" stroke="#9a9070" stroke-width="1.8"/>`;
            svg += `<circle cx="${cx-8}" cy="${midY-7}" r="2.5" fill="#9a9070"/><circle cx="${cx+8}" cy="${midY+7}" r="2.5" fill="#9a9070"/>`;
        } else {
            let m = chord.match(/^([A-G][b#]?)(.*)$/);
            if(m) {
                let r = m[1], q = m[2].replace(/maj7/gi,'Δ7').replace(/m7b5/gi,'ø7');
                svg += `<text x="${cx}" y="${midY}" font-family="IBM Plex Mono" font-weight="700" font-size="24" text-anchor="middle" dominant-baseline="central">${r}<tspan dy="-10" font-size="12" font-weight="400">${q}</tspan></text>`;
            }
        }
    });
    return svg + `</svg>`;
}

function updateGrid() {
    const title = document.getElementById('iTitle').value || 'Música';
    const artist = document.getElementById('iArtist').value || '';
    const key = document.getElementById('iKey').value || '';
    const text = document.getElementById('csEdit').value;

    let html = `<div class="rb-title">${title}</div><div style="margin-bottom:20px; font-style:italic;">${artist} | Tom: ${key}</div>`;
    
    const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
    let currentLabel = null;
    let gridContent = `<div class="rb-sec-group">`;

    lines.forEach((line, idx) => {
        if (line.startsWith(':')) {
            if(idx > 0) gridContent += `</div><div class="rb-sec-group">`;
            currentLabel = line.replace(':', '').trim();
        } else {
            gridContent += `<div class="rb-system-wrap">${renderSVG(line, currentLabel, !!currentLabel)}</div>`;
            currentLabel = null;
        }
    });
    
    document.getElementById('out').innerHTML = html + gridContent + `</div>`;
}

/* STORAGE */
function createNewSong() {
    const s = { id: Date.now(), title: '', artist: '', key: '', raw: '', clean: '' };
    songs.push(s);
    loadSong(s.id);
}

function loadSong(id) {
    currentId = id;
    const s = songs.find(x => x.id === id);
    document.getElementById('iTitle').value = s.title || '';
    document.getElementById('iArtist').value = s.artist || '';
    document.getElementById('iKey').value = s.key || '';
    document.getElementById('cifraBruta').value = s.raw || '';
    document.getElementById('csEdit').value = s.clean || '';
    renderList();
    updateGrid();
}

function saveCurrent() {
    if(!currentId) return;
    const s = songs.find(x => x.id === currentId);
    s.title = document.getElementById('iTitle').value;
    s.artist = document.getElementById('iArtist').value;
    s.key = document.getElementById('iKey').value;
    s.raw = document.getElementById('cifraBruta').value;
    s.clean = document.getElementById('csEdit').value;
    localStorage.setItem('roadmap_v4', JSON.stringify(songs));
    renderList();
}

function deleteSong(id, e) {
    e.stopPropagation();
    if(!confirm("Remover música?")) return;
    songs = songs.filter(x => x.id !== id);
    localStorage.setItem('roadmap_v4', JSON.stringify(songs));
    if(songs.length > 0) loadSong(songs[0].id);
    else location.reload();
}

function renderList() {
    const list = document.getElementById('songList');
    list.innerHTML = songs.map(s => `
        <div class="song-item ${s.id===currentId?'active':''}" onclick="loadSong(${s.id})">
            <span>${s.title || 'Nova Música'}</span>
            <span class="del-btn" onclick="deleteSong(${s.id}, event)">✕</span>
        </div>
    `).join('');
}

if(songs.length > 0) loadSong(songs[0].id);
else createNewSong();
</script>
</body>
</html>
